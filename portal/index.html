function slugify(s="") { return s.trim().replace(/\s+/g,"-"); }

function parseDateIL(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
  if (!m) return null;
  const [, d, mo, y] = m.map(Number);
  return new Date(y < 100 ? 2000 + y : y, mo - 1, d);
}

function pilotInfo(launchDate) {
  const launch = parseDateIL(launchDate);
  if (!launch || isNaN(launch.getTime())) return { status: 'unknown' };
  const now = new Date();
  const days = (now - launch) / (24 * 3600 * 1000);
  if (days < 0) return { status: 'upcoming', launch };
  const week = Math.min(4, Math.floor(days / 7) + 1);
  if (days < 28) return { status: 'pilot', week, launch };
  return { status: 'regular', launch };
}

function isUrgent() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu
  const hour = now.getHours();
  if (day === 2 && hour >= 13) return true;
  if (day === 3 || day === 4) return true;
  return false;
}

function getActiveReminders(pilot) {
  const now  = new Date();
  const day  = now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const hour = now.getHours();
  const out  = [];

  // ח'-ראשון 16:00 עד ראשון 18:00 — הזמנת משתתפים חדשים
  const isInviteWindow = (day===4&&hour>=16)||day===5||day===6||(day===0&&hour<18);
  if (isInviteWindow) out.push({
    id:'invite', color:'#7c3aed',
    title:'🙋 הזמן/י משתתפים חדשים',
    body:'עכשיו חלון הזמן להזמין חברים, שכנים ומשפחה לקבוצה לפני פתיחת ההזמנות ביום ראשון.',

    body:'היום יום שני — זה הזמן להזמין לעצמך סל רכזים לשבוע הבא.',
  });

  });

  return out;
}

function matchCoord(coords, cp) {
  const s = slugify(cp);
  const first = s.split('-')[0];
  return coords.find(x =>
    x.coordKey === s ||
    slugify(x.coordName) === s ||
    (first.length > 1 && (slugify(x.coordName).startsWith(first + '-') || x.coordKey.startsWith(first + '-')))
  );
}

// האם coordKey מההזמנות תואם coordKey מהגיליון?
function coordKeysMatch(orderKey, sheetKey) {
  if (orderKey === sheetKey) return true;
  if (COORD_ALIASES[orderKey] === sheetKey) return true;
  const sheetFirst = normName(sheetKey.split('-')[0]);
  // בדוק כל token בשם ההזמנה (מטפל בפורמט "עיר--שם" וגם "שם-משפחה")
  const tokens = orderKey.replace(/--/g, '-').split('-').filter(Boolean);
  return tokens.some(t => normName(t) === sheetFirst);
}

function extractFirstName(coordKey) {
  // "שורשים--טליה" → "טליה", "כרמיאל--מכוש-מירב" → "מירב", "רחלי" → "רחלי"
  const parts = coordKey.split('--');
  const namePart = parts[parts.length - 1];
  const words = namePart.split('-').filter(Boolean);
  return (words[words.length - 1] || coordKey).replace(/[''']/g, '');
}

function selfOrdered(coord) {
  if (!coord.orders || !coord.coordName) return false;
  const first = normName(coord.coordName.split(/[\s\-]+/)[0]);
  return coord.orders.some(o => normName((o.name||'').split(/[\s\-]+/)[0]) === first);
}

function mergeCoordsWithList(coords, allCoords) {
  if (!allCoords || allCoords.length === 0) return coords;
  const matched = new Set();
  const result = allCoords.map(sheetCoord => {
    const match = coords.find(c => coordKeysMatch(c.coordKey, sheetCoord.coordKey));
    if (match) {
      matched.add(match.coordKey);
      return { ...sheetCoord, orders: match.orders, coordPhone: match.coordPhone, deliveryStr: match.deliveryStr };
    }
    return { ...sheetCoord, orders: [], coordPhone: '' };
  });
  const orphans = coords.filter(c => !matched.has(c.coordKey));
  return [...result, ...orphans].filter(c => c.coordName && c.coordName.trim() && c.coordName !== '0');
}
function CoordName({name, style={}}) {
  return <span dir="auto" style={{unicodeBidi:'plaintext',...style}}>{name}</span>;
}
function fmtPhone(p) {
  if(!p||p.length<9) return p||"";
  if(p.startsWith("0")&&p.length===10) return `${p.slice(0,3)}-${p.slice(3,6)}-${p.slice(6)}`;
  return p;
}
function waLink(phone, msg="") {
  const n=phone.replace(/^0/,"972");
  return `https://wa.me/${n}${msg?`?text=${encodeURIComponent(msg)}`:""}`;
}

function App() {
  const [view,      setView]     = useState("loading");

  const [notifs,    setNotifs]   = useState([]);
  const [progress,  setProgress] = useState([]);

  const [memberData,    setMemberData]    = useState({});
  const [deliveryDays,  setDeliveryDays]  = useState({});
  const [groupNames,    setGroupNames]    = useState({});
  const [adminTab,      setAdminTab]      = useState("overview");
  const [selCoord,  setSelCoord] = useState(null);
  const [tab,       setTab]      = useState("orders");
  const [toast,     setToast]    = useState("");
  const [coordParam,setCoordParam]=useState(null);

  useEffect(() => {
    const hash = window.location.hash;
    let cp = null;
    if (hash.startsWith("#coord=")) cp = decodeURIComponent(hash.slice(7));
    setCoordParam(cp);
    init(cp);
  }, []);

  async function init(cp) {
    setView("loading");

    // Load from localStorage as initial fallback
    const t  = sto_get(K_TIMES);
    const w  = sto_get(K_WEEK);
    const n  = sto_get(K_NOTIFS);
    const p  = sto_get(K_PROGRESS);
    const dr = sto_get(K_DRIVERS);
    const wl = sto_get(K_WALINKS);
    if(t)  setTimes(t);
    if(w)  setWeek(w);
    if(n)  setNotifs(n);
    if(p)  setProgress(p);
    if(dr) setDrivers(dr);
    if(wl) setWaLinks(wl);
    const ch = sto_get(K_HISTORY);   if(ch) setCoordHistory(ch);
    const md = sto_get(K_MEMBERS);   if(md) setMemberData(md);
    const dd = sto_get(K_DELIV_DAYS);if(dd) setDeliveryDays(dd);
    const gn = sto_get(K_GRP_NAMES); if(gn) setGroupNames(gn);

    // Fetch server settings (secretary writes here, all portals read)
    try {
      const sr = await fetch('/api/settings');
      const sv = await sr.json();
      if (sv.times   && Object.keys(sv.times).length)   { setTimes(sv.times);     sto_set(K_TIMES,   sv.times);   }
      if (sv.drivers && Object.keys(sv.drivers).length)  { setDrivers(sv.drivers); sto_set(K_DRIVERS, sv.drivers); }
      if (sv.waLinks && Object.keys(sv.waLinks).length)  { setWaLinks(sv.waLinks); sto_set(K_WALINKS, sv.waLinks); }
      if (sv.week?.num) { setWeek(sv.week); sto_set(K_WEEK, sv.week); }
      if (sv.coordHistory)  { setCoordHistory(sv.coordHistory);   sto_set(K_HISTORY,    sv.coordHistory);   }
      if (sv.memberData)    { setMemberData(sv.memberData);       sto_set(K_MEMBERS,    sv.memberData);     }
      if (sv.deliveryDays)  { setDeliveryDays(sv.deliveryDays);   sto_set(K_DELIV_DAYS, sv.deliveryDays);  }
      if (sv.groupNames)    { setGroupNames(sv.groupNames);        sto_set(K_GRP_NAMES,  sv.groupNames);    }
    } catch(e) {}

    try {
      const res  = await fetch('/api/data');
      const data = await res.json();
      if (!data.empty) {
        const orderCoords = data.coords || [];
        const sheetCoords = data.coordinators || [];
        const merged = mergeCoordsWithList(orderCoords, sheetCoords);
        setCoords(merged);
        setUpdatedAt(data.updatedAt);
        if (cp) {
          let found = matchCoord(orderCoords, cp);
          if (!found) {
            const fromSheet = sheetCoords.find(x => x.coordKey===slugify(cp) || slugify(x.coordName)===slugify(cp));
            if (fromSheet) found = { ...fromSheet, orders: [], coordPhone: '' };
          }
          if (found) { setSelCoord(found); setView("coord"); return; }
          setView("error"); return;
        }
        setView("admin");
        return;
      }
    } catch(e) {}

    setView(cp ? "error" : "empty");
  }

  function showToast(msg,dur=3000){setToast(msg);setTimeout(()=>setToast(""),dur);}

  async function postSettings(patch) {
    try { await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(patch) }); } catch(e) {}
  }

  async function saveTimes(t)  { setTimes(t);   sto_set(K_TIMES,t);   await postSettings({times:t});   showToast("✅ שעות נשמרו"); }
  async function saveDrivers(dr){ setDrivers(dr); sto_set(K_DRIVERS,dr); await postSettings({drivers:dr}); showToast("✅ נהגים נשמרו"); }
  async function saveWaLinks(wl){ setWaLinks(wl); sto_set(K_WALINKS,wl); await postSettings({waLinks:wl}); showToast("✅ לינקי קבוצה נשמרו"); }
  async function saveMemberData(md)   { setMemberData(md);   sto_set(K_MEMBERS,   md); await postSettings({memberData:md});   showToast("✅ נתוני חברים נשמרו"); }
  async function saveDeliveryDays(dd) { setDeliveryDays(dd); sto_set(K_DELIV_DAYS,dd); await postSettings({deliveryDays:dd}); showToast("✅ ימי חלוקה נשמרו"); }
  async function saveGroupNames(gn)   { setGroupNames(gn);   sto_set(K_GRP_NAMES, gn); await postSettings({groupNames:gn});   showToast("✅ שמות קבוצות נשמרו"); }

    const t=times[coord.coordKey]||"17:00";
    const msg=buildStoreOpen(coord,t,week.num);
    const newN=[{ts:Date.now(),coordKey:coord.coordKey,coordName:coord.coordName,week:week.num},...(notifs||[])].slice(0,50);
    const newWeek={...week,openedAt:Date.now()};

    const snap={ week:week.num, orders:coord.orders.length, revenue:coord.orders.reduce((s,o)=>s+o.total,0), date:new Date().toISOString() };
    const prev=(coordHistory[coord.coordKey]||[]).filter(h=>h.week!==week.num);
    const newHistory={...coordHistory, [coord.coordKey]:[...prev,snap].sort((a,b)=>a.week-b.week)};

    setNotifs(newN); setWeek(newWeek); setCoordHistory(newHistory);
    sto_set(K_NOTIFS,newN); sto_set(K_WEEK,newWeek); sto_set(K_HISTORY,newHistory);
    postSettings({week:newWeek, coordHistory:newHistory});
    navigator.clipboard.writeText(msg).then(()=>showToast("🔔 הודעת פתיחה הועתקה — הדבק בקבוצה!"));
  }

  async function updateMembers(weekNum,val){

  function sendCoordWA(c){
    const msg=`היי ${c.coordName}! 🌿\nהנה הפורטל שלך:\n${coordLink(c)}`;

    }).length;
    return {rank:better+1, total:coords.length};
  })();

}

function weekOfMonth() {
  const d = new Date().getDate();
  return ['','ראשון','שני','שלישי','רביעי','חמישי'][Math.ceil(d/7)] || Math.ceil(d/7);
}

function getCoordStatus(coord) {
  const p = pilotInfo(coord.launchDate);
  const orders = coord.orders.length;
  const revenue = coord.orders.reduce((s,o) => s+o.total, 0);
  if (p.status === 'regular') {
    if (revenue < 1000) return 'red';
    if (revenue < 2500) return 'yellow';
    return 'green';
  }
  // פיילוט: רק אדום/ירוק
  return orders < 5 ? 'red' : 'green';
}

// SPARKLINE
// ══════════════════════════════════════════════
function Sparkline({history, isRegular}) {
  if (!history || history.length < 2) return null;
  const data = history.slice(-6);
  const vals = data.map(d => isRegular ? (d.revenue||0) : (d.orders||0));
  const max = Math.max(...vals, 1);
  const W = 100, H = 28;
  const pts = vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-(v/max)*H}`).join(' ');
  const last = vals[vals.length-1];
  const prev = vals[vals.length-2];
  const up = last > prev, dn = last < prev;
  const tc = up ? '#86efac' : dn ? '#fca5a5' : '#ffd166';
  const arrow = up ? '↑' : dn ? '↓' : '→';
  return (
    <div style={{marginTop:14}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,opacity:.75,marginBottom:5}}>
        <span>📊 {data.length} שבועות אחרונים</span>
        <span style={{color:tc,fontWeight:700}}>{arrow} {isRegular?`₪${last.toLocaleString('he-IL')}`:`${last} הז׳`}</span>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible',display:'block'}}>
        <polyline points={pts} fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        {vals.map((v,i)=>(
          <circle key={i}
            cx={(i/(vals.length-1))*W} cy={H-(v/max)*H}
            r={i===vals.length-1?3:2}
            fill={i===vals.length-1?tc:"rgba(255,255,255,.45)"}/>
        ))}
      </svg>
    </div>
  );
}

// CONFETTI
// ══════════════════════════════════════════════
function Confetti({colors}) {
  const COLORS = colors || ['#ffd166','#86efac','#60a5fa','#f472b6','#fb923c','#a78bfa','#34d399','#fbbf24'];
  const pieces = Array.from({length: 28}, (_, i) => ({
    id: i,
    color: COLORS[i % COLORS.length],
    left: `${((i * 3.7 + Math.sin(i) * 9 + 3) % 96) + 2}%`,
    delay: `${((i * 0.11) % 1.6).toFixed(2)}s`,
    duration: `${(1.6 + (i % 6) * 0.25).toFixed(2)}s`,
    size: 6 + (i % 5) * 2,
    radius: i % 3 === 0 ? '50%' : i % 3 === 1 ? '2px' : '0%',
  }));
  return (
    <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,overflow:'hidden',pointerEvents:'none',zIndex:5}}>
      {pieces.map(p => (
        <div key={p.id} style={{
          position:'absolute', left:p.left, top:'-12px',
          width:p.size, height:p.size,
          background:p.color, borderRadius:p.radius,
          animation:`confettiFall ${p.duration} ${p.delay} ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function CoordScreen({coord,driver,waGroupLink,week,onBack,tab,setTab,toast,showToast,updatedAt,history,memberEntry,rank,totalCoords}) {
  if(!coord) return null;

  const missing=MIN_ORDERS-orderCount;
  const daysSinceLaunch = pilot.launch ? Math.floor((Date.now()-pilot.launch.getTime())/(24*3600*1000)) : 999;
  const justGraduated = isRegular && daysSinceLaunch < 35;
  // pilotPassed: majority of recorded weeks had ≥5 orders; if no history, check current week

    if (!history || history.length === 0) return orderCount >= MIN_ORDERS;
    const good = history.filter(h=>(h.orders||0) >= MIN_ORDERS).length;
    return good >= Math.ceil(history.length / 2);
  })();
  const prevWeeks = (history||[]).filter(h=>h.week!==week?.num).sort((a,b)=>a.week-b.week);
  const lastWeek = prevWeeks.length ? prevWeeks[prevWeeks.length-1] : null;

          </div>
        )}
        {hitMemberTarget&&(
          <div style={{position:'relative',overflow:'hidden',marginTop:10,background:'rgba(167,139,250,.2)',border:'1.5px solid #a78bfa',borderRadius:14,padding:'14px 16px 12px'}}>
            <Confetti colors={['#ffd700','#f59e0b','#fbbf24','#fde68a','#fef3c7','#a78bfa','#c4b5fd']}/>
            <div style={{position:'relative',zIndex:6}}>
              <div style={{fontSize:20,fontWeight:900,marginBottom:3}}>🏆 הגעת ל-60 חברים!</div>
              <div style={{fontSize:13,lineHeight:1.6,opacity:.95}}>קבוצת וואטסאפ מלאה — {memberEntry?.count} חברים פעילים. עבודה מדהימה! ⭐</div>
            </div>
          </div>
        )}
        {beatLastWeek&&!justGraduated&&(
          <div style={{position:'relative',overflow:'hidden',marginTop:10,background:'rgba(134,239,172,.18)',border:'1.5px solid #86efac',borderRadius:14,padding:'14px 16px 12px'}}>
            <Confetti colors={['#86efac','#34d399','#6ee7b7','#4ade80','#a7f3d0','#ffd166','#fbbf24']}/>
            <div style={{position:'relative',zIndex:6}}>
              <div style={{fontSize:20,fontWeight:900,marginBottom:3}}>📈 שברת את השיא!</div>
              <div style={{fontSize:13,lineHeight:1.6,opacity:.95}}>
                {beatOrders&&beatRevenue ? `${orderCount} הזמנות ו-₪${totalRev.toLocaleString('he-IL')} — יותר מכל שבוע עד עכשיו 🔥`
                  : beatOrders ? `${orderCount} הזמנות — יותר מהשבוע שעבר (${lastWeek.orders}) 🔥`
                  : `₪${totalRev.toLocaleString('he-IL')} — יותר מהשבוע שעבר (₪${lastWeek.revenue.toLocaleString('he-IL')}) 🔥`}
              </div>
            </div>
          </div>
        )}
        <div style={{marginTop:10,fontSize:10,opacity:.5,textAlign:"center"}}>
          {updatedAt&&<span>עודכן {new Date(updatedAt).toLocaleString('he-IL',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'})} · </span>}
          <span>מתעדכן בכל יום ב-08:00, 13:00, 19:00</span>
        </div>
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.75,marginBottom:4}}>
            <span>👥 חברי קבוצת וואטסאפ{memberEntry?.lastJoined?` · הצטרף אחרון: ${memberEntry.lastJoined}`:""}</span>
            <span>{memberEntry?.count||0} / {GROUP_TARGET}</span>
          </div>
          <div style={{background:"rgba(255,255,255,.2)",borderRadius:99,height:8}}>
            <div style={{width:Math.min(100,((memberEntry?.count||0)/GROUP_TARGET)*100)+"%",height:"100%",background:"#ffd166",borderRadius:99,transition:"width .5s"}}/>
          </div>
        </div>
        <Sparkline history={history} isRegular={isRegular}/>
        {rank&&totalCoords&&(
          <div style={{marginTop:10,display:'flex',alignItems:'center',gap:6}}>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.15)'}}/>
            <div style={{fontSize:11,opacity:.8,fontWeight:700,color: rank<=3?'#ffd166':'rgba(255,255,255,.7)'}}>
              {rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'📍'} מקום {rank} מתוך {totalCoords} רכזים
            </div>
            <div style={{flex:1,height:1,background:'rgba(255,255,255,.15)'}}/>
          </div>
        )}
        <div style={{marginTop:12}}>
          {isRegular ? (<>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.75,marginBottom:4}}>
              <span>הכנסות שבועיות{beatRevenue&&<span style={{color:"#ffd166",fontWeight:900}}> 🔥 שיא!</span>}</span>
              <span>₪{totalRev.toLocaleString('he-IL')} / ₪{MIN_REV} מינימום</span>
            </div>
            <div style={{background:"rgba(255,255,255,.2)",borderRadius:99,height:8}}>
              <div style={{width:Math.min(100,(totalRev/MIN_REV)*100)+"%",height:"100%",background:belowMin?"#fca5a5":"#86efac",borderRadius:99,transition:"width .5s"}}/>
            </div>
            {lastWeek&&<div style={{fontSize:10,opacity:.55,marginTop:3}}>שבוע שעבר: ₪{lastWeek.revenue.toLocaleString('he-IL')} · {lastWeek.orders} הזמנות</div>}
          </>) : (<>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,opacity:.75,marginBottom:4}}>
              <span>התקדמות לחלוקה{beatOrders&&<span style={{color:"#ffd166",fontWeight:900}}> 🔥 שיא!</span>}</span>
              <span>{orderCount} / {MIN_ORDERS} מינימום</span>
            </div>
            <div style={{background:"rgba(255,255,255,.2)",borderRadius:99,height:8}}>
              <div style={{width:Math.min(100,(orderCount/MIN_ORDERS)*100)+"%",height:"100%",background:belowMin?"#fca5a5":"#86efac",borderRadius:99,transition:"width .5s"}}/>
            </div>
            {lastWeek&&<div style={{fontSize:10,opacity:.55,marginTop:3}}>שבוע שעבר: {lastWeek.orders} הזמנות{lastWeek.revenue?` · ₪${lastWeek.revenue.toLocaleString('he-IL')}`:""}</div>}
          </>)}
        </div>
      </div>

      {belowMin&&(
        <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",margin:"12px 14px 0",borderRadius:12,padding:"14px"}}>
          <p style={{fontSize:14,fontWeight:800,color:"#991b1b",marginBottom:6}}>⚠️ סכנה — החלוקה עלולה לא להגיע!</p>
          <p style={{fontSize:12,color:"#7f1d1d",lineHeight:1.6,marginBottom:12}}>
            {isRegular
              ?<>הגעת ל-₪{totalRev.toLocaleString('he-IL')}. צריך לפחות ₪{MIN_REV}.<br/><strong>שלח/י עכשיו לקבוצה:</strong></>
              :<>יש לך {orderCount} הזמנות. צריך לפחות {MIN_ORDERS}.<br/><strong>שלח/י עכשיו לקבוצה:</strong></>
            }
          </p>
          <CopyBtnSimple text={boostMsg} label="📋 העתק הודעת דחיפה"/>
          {waGroupLink&&<a href={waGroupLink} target="_blank" style={{display:"block",marginTop:8,background:"#25d366",color:"#fff",padding:"9px",borderRadius:9,textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13}}>
            💬 פתח קבוצה ושלח
          </a>}
        </div>
      )}

      <div style={{background:"#fff",borderBottom:"1px solid #e8ede9",display:"flex",marginTop:belowMin?12:0}}>
        {[["orders","📋"],["messages","📤"],["reminders","🔔"],["faq","❓"]].map(([k,l])=>(
          <div key={k} onClick={()=>setTab(k)}
            style={{flex:1,padding:"12px 4px",textAlign:"center",fontSize:20,color:tab===k?(belowMin?"#b91c1c":"#2d6a4f"):"#9ca3af",borderBottom:tab===k?`2px solid ${belowMin?"#b91c1c":"#2d6a4f"}`:"2px solid transparent",cursor:"pointer",position:"relative"}}>
            {l}
            {k==="reminders"&&activeReminders.length>0&&<span style={{position:"absolute",top:6,right:"calc(50% - 18px)",background:"#e63946",color:"#fff",borderRadius:99,fontSize:10,fontWeight:900,padding:"1px 5px",lineHeight:1.4}}>{activeReminders.length}</span>}
          </div>
        ))}
      </div>
      <Body>
        {tab==="orders"    && <OrdersTab coord={coord} showToast={showToast}/>}
        {tab==="messages"  && <MessagesTab coord={coord} week={week} pilot={pilot} driver={driver} waGroupLink={waGroupLink} justGraduated={justGraduated} pilotPassed={pilotPassed} beatLastWeek={beatLastWeek} beatOrders={beatOrders} beatRevenue={beatRevenue} lastWeek={lastWeek} orderCount={orderCount} totalRev={totalRev} hitMemberTarget={hitMemberTarget} memberEntry={memberEntry} showToast={showToast}/>}
        {tab==="reminders" && <RemindersTab coord={coord} pilot={pilot} activeReminders={activeReminders} waGroupLink={waGroupLink} history={history} showToast={showToast}/>}
        {tab==="faq"       && <FaqTab/>}
      </Body>
      <Toast msg={toast}/>
    </Screen>
  );
}

function OrdersTab({coord,showToast}) {
  const [copied,setCopied]=useState(false);
  const [expanded,setExpanded]=useState(null);
  const newCount=coord.orders.filter(o=>o.returning===false).length;
  const retCount=coord.orders.length-newCount;
  function copyList(){
    const lines=[`שלום חברים! 😊`,`הנה רשימת המזמינים לחלוקה:`,"",...coord.orders.map((o,i)=>`${i+1}. ${o.name}${o.phone?" — "+fmtPhone(o.phone):""}`),"",`סה"כ ${coord.orders.length} מזמינים. מחכים לכם! 🌿`];
    navigator.clipboard.writeText(lines.join("\n")).then(()=>{setCopied(true);showToast("✅ הועתק");setTimeout(()=>setCopied(false),3500);});
  }
  return (
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <p style={T.cardTitle}>📋 רשימת מזמינים</p>
        {coord.orders.length>0&&(
          <div style={{display:'flex',gap:6,fontSize:11,fontWeight:700}}>
            {newCount>0&&<span style={{background:'#dbeafe',color:'#1d4ed8',padding:'2px 8px',borderRadius:99}}>🆕 {newCount} חדשים</span>}
            {retCount>0&&<span style={{background:'#dcfce7',color:'#166534',padding:'2px 8px',borderRadius:99}}>🔄 {retCount} חוזרים</span>}
          </div>
        )}
      </div>
      {coord.orders.map((o,i)=>(
        <div key={i} style={{borderBottom:i<coord.orders.length-1?"1px solid #e8ede9":"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",cursor:o.items?.length?"pointer":"default"}}
            onClick={()=>o.items?.length&&setExpanded(expanded===i?null:i)}>
            <div style={{fontSize:12,color:"#9ca3af",minWidth:22,fontWeight:700}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontWeight:700,fontSize:14}}>{o.name||"—"}</span>
                {o.returning===false&&<span style={{background:"#dbeafe",color:"#1d4ed8",fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:99}}>חדש 🆕</span>}
              </div>
              <div style={{fontSize:12,color:"#6b7280",direction:"ltr"}}>{fmtPhone(o.phone)||"—"}</div>
            </div>
            {o.items?.length>0&&<div style={{fontSize:11,color:"#9ca3af"}}>{o.items.length} פריטים {expanded===i?"▲":"▼"}</div>}
            {o.total>0&&<div style={{fontSize:13,fontWeight:700,color:"#2d6a4f",minWidth:40}}>₪{o.total}</div>}
            {o.phone&&<a href={waLink(o.phone)} target="_blank" onClick={e=>e.stopPropagation()}
              style={{width:34,height:34,background:"#25d366",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16,textDecoration:"none",flexShrink:0}}>💬</a>}
          </div>
          {expanded===i&&o.items?.length>0&&(
            <div style={{background:"#f8fdf9",borderRadius:10,padding:"10px 12px",marginBottom:8}}>
              {o.items.map((item,j)=>(
                <div key={j} style={{display:"flex",gap:8,padding:"4px 0",fontSize:13,borderBottom:j<o.items.length-1?"1px solid #e8ede9":"none"}}>
                  <span style={{fontWeight:700,color:"#2d6a4f",minWidth:24}}>{item.qty}</span>
                  <span style={{color:"#6b7280",minWidth:40}}>{item.unit}</span>
                  <span style={{flex:1}}>{item.name}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
      <button onClick={copyList} style={{...S.btn,marginTop:14,background:copied?"#16a34a":"#2d6a4f",transition:"background .3s"}}>
        {copied?"✅ הועתק — הדבק בקבוצה":"📋 העתק רשימה לוואטסאפ"}
      </button>
    </Card>
  );
}

function MessagesTab({coord,week,pilot,driver,waGroupLink,justGraduated,pilotPassed,beatLastWeek,beatOrders,beatRevenue,lastWeek,orderCount,totalRev,hitMemberTarget,memberEntry,showToast}) {
  const storeLink=getStoreLink();
  const weekLabel = pilot?.status==="pilot" ? `פיילוט שבוע ${pilot.week}/4` : `שבוע ${week?.num||1}`;
  const msgs=[
    {title:"🔔 פתיחת חנות",      sub:"לפרסום בקבוצה",              color:"#1a3c2e", text:buildStoreOpen(coord,null,weekLabel)},
    {title:"🌿 הודעה שבועית",    sub:"שיווק + לינק + קריאה לשתף", color:"#2d6a4f", text:buildGroupAnnounce(coord,null,weekLabel)},
    {title:"🔗 לינק החנות",      sub:"להעתקה ושיתוף",              color:"#52b788", text:storeLink},
    {title:"💬 שירות לקוחות",   sub:"התכתבות WA בלבד",            color:"#f4a261", text:`שירות לקוחות פופ ישראל 💬\n${fmtPhone(CS_PHONE)}\n\n⚠️ בהתכתבות בוואטסאפ בלבד (לא שיחות)`},
    {title:"📋 רווית — לוגיסטיקה", sub:"נהג / עיכוב / תיאום",    color:"#e67e22", text:`רווית — מתאמת לוגיסטיקה 🚐\n${fmtPhone(RAVIT_PHONE)}\n\nפונים לרווית רק בנושאים:\n• בעיה עם הנהג\n• עיכוב בחלוקה\n• תיאום מיוחד\n\nבעיות הזמנה ותשלום → שירות לקוחות בלבד.`},
  ];
  if(driver?.phone) msgs.push({title:`🚐 ${driver.name||"הנהג שלך"}`,sub:fmtPhone(driver.phone),color:"#6b7280",text:`הנהג שלך: ${driver.name||""}\n${fmtPhone(driver.phone)} 📞`});
  const graduationMsg = `🎉 *כל הכבוד — השלמנו את הפיילוט!*\n\nחברים, 4 שבועות עברנו ביחד והפכנו לנקודת חלוקה קבועה של פופ ישראל 🌿\n\nתודה לכל אחד ואחת שהזמין, שיתף, ותמך — יחד עשינו את זה! 💚\n\nמעכשיו אנחנו ממשיכים לצמוח יחד, שבוע אחרי שבוע.\n\nמי שעוד לא הזמין — החנות פתוחה כרגיל 👇\n${getStoreLink()}`;

  const beatMsg = beatOrders&&beatRevenue
    ? `🔥 *שברנו שיא השבוע!*\n\n${orderCount} הזמנות ו-₪${totalRev.toLocaleString('he-IL')} — יותר מכל שבוע עד עכשיו!\n\nתודה לכולם שהזמינו ושהמליצו 💚\nיחד אנחנו גדלים שבוע אחרי שבוע 🌿`
    : beatOrders
    ? `🔥 *שברנו שיא בהזמנות!*\n\n${orderCount} הזמנות השבוע — יותר מהשבוע שעבר (${lastWeek?.orders})!\n\nתודה לכולם שהזמינו ושהמליצו 💚\nיחד אנחנו גדלים שבוע אחרי שבוע 🌿`
    : `🔥 *שברנו שיא בסכום!*\n\n₪${totalRev.toLocaleString('he-IL')} השבוע — יותר מהשבוע שעבר (₪${lastWeek?.revenue.toLocaleString('he-IL')})!\n\nתודה לכולם שהזמינו ושהמליצו 💚\nיחד אנחנו גדלים שבוע אחרי שבוע 🌿`;

  const membersMsg = `🏆 *הגענו ל-${memberEntry?.count} חברים בקבוצה!*\n\nזה לא מובן מאליו — כל אחד ואחת מכם הוסיף חבר, שיתף לינק, המליץ לשכן.\n\nתודה שאתם חלק מהתנועה 🌿\n\nביחד אנחנו יוצרים משהו אמיתי 💚`;

  return <>
    {justGraduated&&pilotPassed&&<CopyCard title="🎉 סיימנו פיילוט!" sub="שלח לקבוצה — הישג משותף" color="#f59e0b" text={graduationMsg} showToast={showToast}/>}
    {justGraduated&&!pilotPassed&&<CopyCard title="🙏 תודה על הנכונות" sub="שלח לקבוצה — סיום הפיילוט" color="#92400e" text={`תודה רבה לכל אחד מכם על הנכונות להיות חלק מהפיילוט שלנו 🙏\n\nזה לא מובן מאליו — ההשתתפות שלכם, ולו גם בצעד אחד, מאוד משמעותית לנו.\n\nנשמח לראות אתכם שוב בפופ ישראל בעתיד 🌿`} showToast={showToast}/>}
    {hitMemberTarget&&<CopyCard title={`🏆 הגענו ל-${memberEntry?.count} חברים!`} sub="שלח לקבוצה — אבן דרך" color="#7c3aed" text={membersMsg} showToast={showToast}/>}
    {beatLastWeek&&<CopyCard title="🔥 שברנו את השיא!" sub="שלח לקבוצה — מוטיבציה לשבוע הבא" color="#059669" text={beatMsg} showToast={showToast}/>}
    {msgs.slice(0,3).map((m,i)=><CopyCard key={i} {...m} showToast={showToast}/>)}
    <div style={{background:"#fffbeb",border:"1.5px solid #fcd34d",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
      <p style={{fontSize:12,fontWeight:800,color:"#92400e",marginBottom:6}}>📞 למי פונים?</p>
      <div style={{fontSize:12,color:"#78350f",lineHeight:1.7}}>
        <div>💬 <strong>שירות לקוחות</strong> — בעיות הזמנה, תשלום, איכות<br/><span style={{opacity:.75,paddingRight:20}}>התכתבות WA בלבד · {fmtPhone(CS_PHONE)}</span></div>
        <div style={{marginTop:6}}>🚐 <strong>רווית</strong> — נהג / עיכוב / תיאום מיוחד<br/><span style={{opacity:.75,paddingRight:20}}>{fmtPhone(RAVIT_PHONE)}</span></div>
      </div>
    </div>
    {msgs.slice(3).map((m,i)=><CopyCard key={i+3} {...m} showToast={showToast}/>)}
    <Card>
      <p style={{...T.cardTitle,marginBottom:10}}>💬 הודעות אישיות ללקוחות</p>
      {coord.orders.filter(o=>o.phone).slice(0,5).map((o,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #e8ede9"}}>
          <div style={{flex:1,fontSize:13,fontWeight:600}}>{o.name}</div>
          <a href={waLink(o.phone, buildPersonalMsg(o,coord,time))} target="_blank"
            style={{background:"#25d366",color:"#fff",padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:700,textDecoration:"none"}}>💬 שלח</a>
        </div>
      ))}
    </Card>
  </>;
}

function CopyCard({title,sub,color,text,showToast}) {
  const [copied,setCopied]=useState(false);
  function copy(){navigator.clipboard.writeText(text).then(()=>{setCopied(true);showToast("✅ הועתק!");setTimeout(()=>setCopied(false),2500);});}
  return (
    <div style={{...S.card,borderRight:`4px solid ${color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontSize:14,fontWeight:800,color:"#1a3c2e"}}>{title}</div><div style={{fontSize:11,color:"#6b7280"}}>{sub}</div></div>
        <button onClick={copy} style={{background:copied?"#16a34a":color,color:"#fff",border:"none",padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",transition:"background .3s",flexShrink:0}}>
          {copied?"✅ הועתק":"📋 העתק"}
        </button>
      </div>
      <div style={{background:"#f9fafb",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#374151",whiteSpace:"pre-wrap",direction:"rtl",lineHeight:1.6,maxHeight:90,overflow:"hidden"}}>
        {text.length>180?text.slice(0,180)+"…":text}
      </div>
    </div>
  );
}

function FaqTab() {
  const [open,setOpen]=useState(null);
  return (
    <Card>
      <p style={{...T.cardTitle,marginBottom:6}}>❓ שאלות נפוצות</p>
      {FAQ.map((f,i)=>(
        <div key={i} style={{borderBottom:"1px solid #e8ede9"}}>
          <div onClick={()=>setOpen(open===i?null:i)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",cursor:"pointer"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1a3c2e",flex:1,paddingLeft:8}}>{f.q}</span>
            <span style={{color:"#6b7280",fontSize:16}}>{open===i?"▲":"▼"}</span>
          </div>
          {open===i&&<div style={{paddingBottom:12}}>
            <div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#374151",lineHeight:1.6,marginBottom:8}}>{f.a}</div>
            <CopyBtnSimple text={`${f.q}\n${f.a}`} label="📋 העתק תשובה"/>
          </div>}
        </div>
      ))}
    </Card>
  );
}

function RemindersTab({coord,pilot,activeReminders,waGroupLink,history,showToast}) {
  const [notifGranted,setNotifGranted]=useState(typeof Notification!=="undefined"?Notification.permission==="granted":false);
  async function requestNotif(){const perm=await Notification.requestPermission();setNotifGranted(perm==="granted");showToast(perm==="granted"?"✅ נוטיפיקציות פעילות!":"⚠️ לא אושר");}
  function testNotif(){if(!notifGranted){showToast("⚠️ אשר קודם");return;}new Notification("🌿 תזכורת פופ ישראל",{body:"החנות פתוחה! הזמן עכשיו ✅"});}
  const pilotMsg=buildPilotMsg(coord,waGroupLink);
  return <>
    {(activeReminders||[]).map(r=>(
      <div key={r.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,borderRight:`4px solid ${r.color}`,boxShadow:"0 2px 10px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:14,fontWeight:800,color:"#1a3c2e",marginBottom:4}}>{r.title}</div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{r.body}</div>
      </div>
    ))}
    <Card style={{borderRight:"4px solid #2d6a4f"}}>
      <p style={{...T.cardTitle,marginBottom:6}}>📅 תזכורת שבועית</p>
      {!notifGranted
        ?<button style={S.btn} onClick={requestNotif}>🔔 אפשר תזכורות</button>
        :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button style={{...S.btnSmall,background:"#6b7280",padding:10}} onClick={testNotif}>🧪 בדוק עכשיו</button>
        </div>}
      {notifGranted&&<p style={{fontSize:11,color:"#16a34a",marginTop:10,textAlign:"center"}}>✅ נוטיפיקציות פעילות</p>}
    </Card>
    {pilot?.status==="pilot" && (
      <Card style={{borderRight:"4px solid #f4a261"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div><p style={{...T.cardTitle,marginBottom:2}}>🌱 הודעת פיילוט — שבוע {pilot.week}/4</p><p style={{fontSize:11,color:"#6b7280"}}>לפרסום לשכנים וחברים</p></div>
          <CopyBtnSimple text={pilotMsg} label="📋 העתק"/>
        </div>
        <div style={{background:"#fffbf0",border:"1px solid #fde68a",borderRadius:10,padding:"12px",fontSize:12,color:"#374151",whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:220,overflowY:"auto",direction:"rtl"}}>
          {pilotMsg}
        </div>
        {waGroupLink&&<a href={waGroupLink} target="_blank" style={{display:"block",marginTop:10,background:"#25d366",color:"#fff",padding:"10px",borderRadius:10,textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13}}>
          💬 פתח קבוצת וואטסאפ
        </a>}
      </Card>
    )}
    {history?.length > 0 && (
      <Card style={{borderRight:"4px solid #52b788"}}>
        <p style={{...T.cardTitle,marginBottom:12}}>📊 היסטוריית הזמנות</p>
        <MiniBarChart data={history}/>
      </Card>
    )}

    {pilot?.status==="regular" && (
      <Card style={{borderRight:"4px solid #16a34a",textAlign:"center",padding:"24px 16px"}}>
        <div style={{fontSize:36,marginBottom:8}}>🎉</div>
        <div style={{fontSize:16,fontWeight:900,color:"#1a3c2e",marginBottom:6}}>סיימת את הפיילוט!</div>
        <div style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>הנקודה שלך הפכה לנקודת חלוקה קבועה של פופ ישראל 🌿</div>
      </Card>
    )}
  </>;
}

function MiniBarChart({data}) {
  const maxOrders = Math.max(...data.map(d=>d.orders), 1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:72}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:10,fontWeight:700,color:"#2d6a4f"}}>{d.orders}</div>
          <div style={{width:"100%",background:"#52b788",borderRadius:"4px 4px 0 0",minHeight:4,
            height:Math.max(4,Math.round((d.orders/maxOrders)*44))+"px",transition:"height .4s"}}/>
          <div style={{fontSize:9,color:"#9ca3af",whiteSpace:"nowrap"}}>ש׳{d.week}</div>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════
// SHARED COMPONENTS
// ══════════════════════════════════════════════
function GreenHeader({title,sub,children}){
  return <div style={{background:"linear-gradient(155deg,#1a3c2e,#2d6a4f)",padding:"20px 20px 22px",color:"#fff",textAlign:"center"}}>
    <div style={{fontSize:32,marginBottom:4}}>🌿</div>
    <div style={{fontSize:22,fontWeight:900}}>{title}</div>
    {sub&&<div style={{fontSize:12,opacity:.65,marginTop:2}}>{sub}</div>}
    {children}
  </div>;
}
function Screen({children}){return <div style={{fontFamily:"'Heebo',sans-serif",minHeight:"100vh",background:"#fefcf7",direction:"rtl",maxWidth:480,margin:"0 auto"}}>{children}</div>;}
function Body({children}){return <div style={{padding:"14px 14px 48px"}}>{children}</div>;}
function Card({children,style={}}){return <div style={{...S.card,...style}}>{children}</div>;}
function Spinner(){return <div style={{width:36,height:36,border:"4px solid #e8ede9",borderTopColor:"#2d6a4f",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>;}
function Centered({children}){return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:14}}>{children}</div>;}
function Muted({children}){return <p style={{color:"#6b7280",fontSize:14}}>{children}</p>;}
function Toast({msg}){return msg?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1a3c2e",color:"#fff",padding:"12px 22px",borderRadius:99,fontSize:14,fontWeight:600,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,.25)"}}>{msg}</div>:null;}
function CopyBtnSimple({text,label}){
  const [c,setC]=useState(false);
  return <button onClick={()=>{navigator.clipboard.writeText(text).then(()=>{setC(true);setTimeout(()=>setC(false),2000);});}}
    style={{background:c?"#16a34a":"#2d6a4f",color:"#fff",border:"none",padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",transition:"background .3s"}}>
    {c?"✅ הועתק":label}
  </button>;
}

const S={
  card:{background:"#fff",borderRadius:16,padding:"16px 14px",boxShadow:"0 2px 14px rgba(26,60,46,.09)",marginBottom:12},
  btn:{width:"100%",padding:13,background:"#2d6a4f",color:"#fff",border:"none",borderRadius:12,fontFamily:"Heebo,sans-serif",fontSize:15,fontWeight:800,cursor:"pointer"},
  btnSmall:{padding:"9px 12px",background:"#2d6a4f",color:"#fff",border:"none",borderRadius:8,fontFamily:"Heebo,sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"},
  iconBtn:{width:34,height:34,border:"none",borderRadius:8,background:"#f3f4f6",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"},
  stepNum:{width:26,height:26,color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0},
  statBox:{background:"#fff",borderRadius:14,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 10px rgba(26,60,46,.08)"},
  statVal:{fontSize:18,fontWeight:900,color:"#2d6a4f"},
  statLbl:{fontSize:10,color:"#6b7280",marginTop:2},
  input:{width:"100%",border:"1.5px solid #d1fae5",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"Heebo,sans-serif",color:"#1a3c2e",background:"#f9fafb",outline:"none"},
};
const T={
  h2:{fontSize:17,fontWeight:800,color:"#1a3c2e",marginBottom:6},
  muted:{color:"#6b7280",fontSize:13},
  cardTitle:{fontSize:12,fontWeight:800,color:"#2d6a4f",textTransform:"uppercase",letterSpacing:".4px"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
