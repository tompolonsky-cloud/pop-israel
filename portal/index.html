class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error('💥 Tab crash:',e,info);}

function slugify(s="") { return s.trim().replace(/\s+/g,"-"); }

function parseDateIL(s) {
  if (!s) return null;
  const m = String(s).match(/(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
  if (!m) return null;
  const [, d, mo, y] = m.map(Number);
  return new Date(y < 100 ? 2000 + y : y, mo - 1, d);
}

function pilotInfo(launchDate) {
  const launch = parseDateIL(launchDate);
  if (!launch || isNaN(launch.getTime())) return { status: 'unknown' };
  const now = new Date();
  const days = (now - launch) / (24 * 3600 * 1000);
  if (days < 0) return { status: 'upcoming', launch };
  const week = Math.min(4, Math.floor(days / 7) + 1);
  if (days < 28) return { status: 'pilot', week, launch };
  return { status: 'regular', launch };
}

function isUrgent() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu
  const hour = now.getHours();
  if (day === 2 && hour >= 13) return true;
  if (day === 3 || day === 4) return true;
  return false;
}

// מחשב מתי ההזמנות נסגרות — ד׳=רביעי 8:00, ברירת מחדל חמישי 8:00
function getOrderDeadline(delivDay) {
  const HDAYS = {'א':0,'ב':1,'ג':2,'ד':3,'ה':4,'ו':5,'ש':6};
  const closeDay = (delivDay && HDAYS[delivDay] !== undefined) ? HDAYS[delivDay] : 4;
  const now = new Date();
  const d = new Date(now);
  let daysUntil = (closeDay - now.getDay() + 7) % 7;
  if (daysUntil === 0 && now.getHours() >= 8) daysUntil = 7;
  d.setDate(now.getDate() + daysUntil);
  d.setHours(8, 0, 0, 0);
  return d;
}

// תחזית הכנסה לסוף שבוע לפי קצב נוכחי
function getRevenueForecast(totalRev) {
  const now = new Date();
  const day = now.getDay();
  if (day > 4 || (day === 4 && now.getHours() >= 8)) return null;
  const hr = now.getHours() + now.getMinutes() / 60;
  // שעות שחלפו מאז ראשון 19:00 (פתיחת חנות)
  const elapsed = day===0 ? Math.max(0, hr-19)
    : day===1 ? 5+hr : day===2 ? 29+hr : day===3 ? 53+hr : 77+hr;
  if (elapsed < 2 || totalRev <= 0) return null;
  const TOTAL = 85; // חלון סה"כ: ראשון 19:00 → חמישי 8:00
  if (elapsed >= TOTAL) return null;
  return Math.round(totalRev / elapsed * TOTAL);
}

function getActiveReminders(pilot, deliveryDay=null) {
  const now  = new Date();

  // שני בבוקר (לפני 14:00) — הזמן סל רכזים
  if (day===1&&hour<14) out.push({
    id:'basket', color:'#d97706',

    body:'היום יום שני — זה הזמן להזמין לעצמך סל רכזים לשבוע הבא.',
  });

  // שבוע 2 בפיילוט, ימים א–ד — בקשת משוב על הסחורה

  });

  // בוקר יום החלוקה — תזכורת למלא שעת הגעת הנהג
  const HDAYS={'א':0,'ב':1,'ג':2,'ד':3,'ה':4};
  const delivDayNum = deliveryDay && HDAYS[deliveryDay]!==undefined ? HDAYS[deliveryDay] : 4;
  if (day===delivDayNum && hour>=7 && hour<17) out.push({
    id:'driver_arrive', color:'#25d366',
    title:'🚗 מלא את שעת הגעת הנהג',
    body:'היום יום החלוקה! עבור ללשונית 📋 הזמנות ← כרטיס "הנהג הגיע" ← מלא שעה ← שלח הודעה לקבוצה.',
  });

  return out;
}

function matchCoord(coords, cp) {

  const first = s.split('-')[0];
  return coords.find(x =>

    slugify(x.coordName) === s ||
    (first.length > 1 && (slugify(x.coordName).startsWith(first + '-') || x.coordKey.startsWith(first + '-')))
  );
}

// האם coordKey מההזמנות תואם coordKey מהגיליון?
function coordKeysMatch(orderKey, sheetKey) {
  if (orderKey === sheetKey) return true;
  if (COORD_ALIASES[orderKey] === sheetKey) return true;
  const sheetFirst = normName(sheetKey.split('-')[0]);
  // בדוק כל token בשם ההזמנה (מטפל בפורמט "עיר--שם" וגם "שם-משפחה")
  const tokens = orderKey.replace(/--/g, '-').split('-').filter(Boolean);
  return tokens.some(t => normName(t) === sheetFirst);
}

function extractFirstName(coordKey) {
  // "שורשים--טליה" → "טליה", "כרמיאל--מכוש-מירב" → "מירב", "רחלי" → "רחלי"
  const parts = coordKey.split('--');
  const namePart = parts[parts.length - 1];
  const words = namePart.split('-').filter(Boolean);
  return (words[words.length - 1] || coordKey).replace(/[''']/g, '');
}

function selfOrdered(coord) {
  if (!coord.orders || !coord.coordName) return false;
  const first = normName(coord.coordName.split(/[\s\-]+/)[0]);
  return coord.orders.some(o => normName((o.name||'').split(/[\s\-]+/)[0]) === first);
}

function mergeCoordsWithList(coords, allCoords) {
  if (!allCoords || allCoords.length === 0) return coords;
  const matched = new Set();
  const result = allCoords.map(sheetCoord => {
    const match = coords.find(c => coordKeysMatch(c.coordKey, sheetCoord.coordKey));
    if (match) {
      matched.add(match.coordKey);
      return { ...sheetCoord, orders: match.orders, coordPhone: match.coordPhone, deliveryStr: match.deliveryStr };
    }
    return { ...sheetCoord, orders: [], coordPhone: '' };
  });
  const orphans = coords.filter(c => !matched.has(c.coordKey));
  return [...result, ...orphans].filter(c => c.coordName && c.coordName.trim() && c.coordName !== '0');
}
function CoordName({name, style={}}) {
  return <span dir="auto" style={{unicodeBidi:'plaintext',...style}}>{name}</span>;
}
function fmtPhone(p) {
  if(!p||p.length<9) return p||"";
  if(p.startsWith("0")&&p.length===10) return `${p.slice(0,3)}-${p.slice(3,6)}-${p.slice(6)}`;
  return p;
}
function waLink(phone, msg="") {
  const n=phone.replace(/^0/,"972");
  return `https://wa.me/${n}${msg?`?text=${encodeURIComponent(msg)}`:""}`;
}

  const [progress,  setProgress] = useState([]);
  const [coordHistory,  setCoordHistory]  = useState({});
  const [memberData,    setMemberData]    = useState({});
  const [deliveryDays,  setDeliveryDays]  = useState({});
  const [groupNames,    setGroupNames]    = useState({});
  const [coordPhones,   setCoordPhones]   = useState({});
  const [allTimeCustomers, setAllTimeCustomers] = useState({});
  const [adminTab,      setAdminTab]      = useState("overview");
  const [selCoord,  setSelCoord] = useState(null);
  const [tab,       setTab]      = useState("orders");
  const [toast,     setToast]    = useState("");
  const [coordParam,setCoordParam]=useState(null);

  useEffect(() => {
    const hash = window.location.hash;
    let cp = null;
    if (hash.startsWith("#coord=")) cp = decodeURIComponent(hash.slice(7));
    setCoordParam(cp);
    init(cp);
  }, []);

  async function init(cp) {
    setView("loading");

    // Load from localStorage as initial fallback
    const t  = sto_get(K_TIMES);
    const w  = sto_get(K_WEEK);
    const n  = sto_get(K_NOTIFS);
    const p  = sto_get(K_PROGRESS);
    const dr = sto_get(K_DRIVERS);
    const wl = sto_get(K_WALINKS);
    if(t)  setTimes(t);
    if(w)  setWeek(w);
    if(n)  setNotifs(n);
    if(p)  setProgress(p);
    if(dr) setDrivers(dr);
    if(wl) setWaLinks(wl);
    const ch = sto_get(K_HISTORY);   if(ch) setCoordHistory(ch);
    const md = sto_get(K_MEMBERS);   if(md) setMemberData(md);
    const dd = sto_get(K_DELIV_DAYS);if(dd) setDeliveryDays(dd);
    const gn = sto_get(K_GRP_NAMES); if(gn) setGroupNames(gn);
    const ph = sto_get(K_PHONES);    if(ph) setCoordPhones(ph);
    const cu = sto_get(K_CUSTOMERS); if(cu) setAllTimeCustomers(cu);

    // Fetch server settings (secretary writes here, all portals read)
    let sv = {};
    try {
      const sr = await fetch('/api/settings');
      sv = await sr.json();
      if (sv.times   && Object.keys(sv.times).length)   { setTimes(sv.times);     sto_set(K_TIMES,   sv.times);   }
      if (sv.drivers && Object.keys(sv.drivers).length)  { setDrivers(sv.drivers); sto_set(K_DRIVERS, sv.drivers); }
      if (sv.waLinks && Object.keys(sv.waLinks).length)  { setWaLinks(sv.waLinks); sto_set(K_WALINKS, sv.waLinks); }
      if (sv.week?.num) { setWeek(sv.week); sto_set(K_WEEK, sv.week); }
      if (sv.coordHistory)  { setCoordHistory(sv.coordHistory);   sto_set(K_HISTORY,    sv.coordHistory);   }
      if (sv.memberData)    { setMemberData(sv.memberData);       sto_set(K_MEMBERS,    sv.memberData);     }
      if (sv.deliveryDays)  { setDeliveryDays(sv.deliveryDays);   sto_set(K_DELIV_DAYS, sv.deliveryDays);  }
      if (sv.groupNames)    { setGroupNames(sv.groupNames);        sto_set(K_GRP_NAMES,  sv.groupNames);    }
      if (sv.coordPhones)      { setCoordPhones(sv.coordPhones);           sto_set(K_PHONES,     sv.coordPhones);        }
      if (sv.allTimeCustomers) { setAllTimeCustomers(sv.allTimeCustomers); sto_set(K_CUSTOMERS, sv.allTimeCustomers); }
    } catch(e) {}

    try {
      const res  = await fetch('/api/data');
      const data = await res.json();
      if (!data.empty) {
        const orderCoords = data.coords || [];
        const sheetCoords = data.coordinators || [];
        const merged = mergeCoordsWithList(orderCoords, sheetCoords);
        // accumulate phones: any coord that has a phone this week → save for future weeks
        const savedPh = sto_get(K_PHONES) || {};
        const updatedPh = {...savedPh};
        merged.forEach(c => { if(c.coordPhone) updatedPh[c.coordKey] = c.coordPhone; });
        setCoordPhones(updatedPh);
        sto_set(K_PHONES, updatedPh);
        postSettings({coordPhones: updatedPh}).catch(()=>{});
        // enrich coords with stored phones as fallback
        const enriched = merged.map(c => ({...c, coordPhone: c.coordPhone || updatedPh[c.coordKey] || ''}));
        setCoords(enriched);
        // accumulate all-time customers: phone → {name, phone, weeks:[]}; name-only → {name, weeks:[]}
        const weekNum = sv.week?.num || week?.num || 0;
        const storedCust = sto_get(K_CUSTOMERS) || {};
        const updatedCust = JSON.parse(JSON.stringify(storedCust)); // deep clone
        enriched.forEach(c => {
          if (!updatedCust[c.coordKey]) updatedCust[c.coordKey] = {};
          c.orders.forEach(o => {
            const key = o.phone ? o.phone : 'n_' + (o.name||'').trim();
            if (!key || key === 'n_') return;
            const ex = updatedCust[c.coordKey][key] || {};
            const weeks = Array.isArray(ex.weeks) ? [...ex.weeks] : [];
            if (weekNum && !weeks.includes(weekNum)) weeks.push(weekNum);
            if (o.phone) {
              updatedCust[c.coordKey][key] = { name: o.name || ex.name || '', phone: o.phone, weeks };
            } else if (o.name) {
              updatedCust[c.coordKey][key] = { name: o.name.trim(), phone: '', weeks };
            }
          });
        });
        setAllTimeCustomers(updatedCust);
        sto_set(K_CUSTOMERS, updatedCust);
        postSettings({allTimeCustomers: updatedCust}).catch(()=>{});
        setUpdatedAt(data.updatedAt);
        if (cp) {
          let found = matchCoord(orderCoords, cp);
          if (!found) {
            const fromSheet = sheetCoords.find(x => x.coordKey===slugify(cp) || slugify(x.coordName)===slugify(cp));
            if (fromSheet) found = { ...fromSheet, orders: [], coordPhone: '' };
          }
          if (found) { setSelCoord(found); setView("coord"); return; }
          setView("error"); return;
        }
        setView("admin");
        return;
      }
    } catch(e) {}

    setView(cp ? "error" : "empty");
  }

  function showToast(msg,dur=3000){setToast(msg);setTimeout(()=>setToast(""),dur);}

  async function postSettings(patch) {
    try { await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(patch) }); } catch(e) {}
  }

  async function saveTimes(t)  { setTimes(t);   sto_set(K_TIMES,t);   await postSettings({times:t});   showToast("✅ שעות נשמרו"); }
  async function saveDrivers(dr){ setDrivers(dr); sto_set(K_DRIVERS,dr); await postSettings({drivers:dr}); showToast("✅ נהגים נשמרו"); }
  async function saveWaLinks(wl){ setWaLinks(wl); sto_set(K_WALINKS,wl); await postSettings({waLinks:wl}); showToast("✅ לינקי קבוצה נשמרו"); }
  async function saveMemberData(md)   { setMemberData(md);   sto_set(K_MEMBERS,   md); await postSettings({memberData:md});   showToast("✅ נתוני חברים נשמרו"); }
  async function saveDeliveryDays(dd) { setDeliveryDays(dd); sto_set(K_DELIV_DAYS,dd); await postSettings({deliveryDays:dd}); showToast("✅ ימי חלוקה נשמרו"); }
  async function saveGroupNames(gn)   { setGroupNames(gn);   sto_set(K_GRP_NAMES, gn); await postSettings({groupNames:gn});   showToast("✅ שמות קבוצות נשמרו"); }

  async function fireNotif(coord) {
    const t=times[coord.coordKey]||"17:00";
    const msg=buildStoreOpen(coord,t,week.num);
    const newN=[{ts:Date.now(),coordKey:coord.coordKey,coordName:coord.coordName,week:week.num},...(notifs||[])].slice(0,50);
    const newWeek={...week,openedAt:Date.now()};

    const snap={ week:week.num, orders:coord.orders.length, revenue:coord.orders.reduce((s,o)=>s+o.total,0), date:new Date().toISOString() };
    const prev=(coordHistory[coord.coordKey]||[]).filter(h=>h.week!==week.num);
    const newHistory={...coordHistory, [coord.coordKey]:[...prev,snap].sort((a,b)=>a.week-b.week)};

    setNotifs(newN); setWeek(newWeek); setCoordHistory(newHistory);
    sto_set(K_NOTIFS,newN); sto_set(K_WEEK,newWeek); sto_set(K_HISTORY,newHistory);
    postSettings({week:newWeek, coordHistory:newHistory});
    navigator.clipboard.writeText(msg).then(()=>showToast("🔔 הודעת פתיחה הועתקה — הדבק בקבוצה!"));
  }

  async function updateMembers(weekNum,val){
    const newP=(progress||[]).map(p=>p.week===weekNum?{...p,members:val}:p);
    setProgress(newP); sto_set(K_PROGRESS,newP);
  }

  function coordLink(c){return`${window.location.origin}${window.location.pathname}#coord=${encodeURIComponent(slugify(c.coordName))}`;}
  function copyCoordLink(c){navigator.clipboard.writeText(coordLink(c)).then(()=>showToast(`📋 לינק ${c.coordName} הועתק`));}
  function sendCoordWA(c){
    const msg=`היי ${c.coordName}! 🌿\nהנה הפורטל שלך:\n${coordLink(c)}`;
    window.open(c.coordPhone ? waLink(c.coordPhone,msg) : `https://wa.me/?text=${encodeURIComponent(msg)}`);
  }

  if(view==="loading") return <Screen><Centered><Spinner/><Muted>טוען...</Muted></Centered></Screen>;
  if(view==="error")   return <Screen><Centered><div style={{fontSize:48}}>⚠️</div><p style={{color:"#e63946",fontWeight:700,textAlign:"center"}}>לא נמצאת. בקש לינק מעודכן.</p></Centered></Screen>;
  if(view==="empty")   return (
    <Screen>
      <GreenHeader title="פופ ישראל 🌿" sub="פורטל רכזים"/>
      <Body>
        <Card style={{textAlign:"center",padding:"32px 20px"}}>
          <div style={{fontSize:52,marginBottom:12}}>⏳</div>
          <div style={{fontSize:18,fontWeight:800,color:"#1a3c2e",marginBottom:8}}>ממתין לנתונים ראשונים</div>
          <p style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>
            השרת פועל — הנתונים יגיעו בעדכון הבא<br/>
            (08:00 / 13:00 / 19:00)
          </p>
          <button style={{...S.btn,marginTop:20,width:"auto",padding:"10px 24px"}} onClick={()=>init(coordParam)}>
            🔄 רענן עכשיו
          </button>
        </Card>
      </Body>
    </Screen>
  );

  if(view==="admin") return <AdminScreen coords={coords} times={times} drivers={drivers} waLinks={waLinks} week={week}
      notifs={notifs} progress={progress} updatedAt={updatedAt} memberData={memberData} coordHistory={coordHistory}
      deliveryDays={deliveryDays} groupNames={groupNames} adminTab={adminTab} onAdminTab={setAdminTab}
      onSaveTimes={saveTimes} onSaveDrivers={saveDrivers} onSaveWaLinks={saveWaLinks} onFireNotif={fireNotif}
      onSaveMemberData={saveMemberData} onSaveDeliveryDays={saveDeliveryDays} onSaveGroupNames={saveGroupNames}
      onCoordLink={copyCoordLink} onCoordWA={sendCoordWA}
      onOpenCoord={c=>{setSelCoord(c);setTab("orders");setView("coord");}}
      onUpdateMembers={updateMembers} toast={toast} showToast={showToast}/>;

  const coordRank = (() => {
    if (!selCoord || !coords.length) return null;
    const myPilot = pilotInfo(selCoord.launchDate);
    const myVal = myPilot.status==='regular'
      ? selCoord.orders.reduce((s,o)=>s+o.total,0)
      : selCoord.orders.length;
    const better = coords.filter(c=>{
      const p=pilotInfo(c.launchDate);
      const v=p.status==='regular'?c.orders.reduce((s,o)=>s+o.total,0):c.orders.length;
      return v>myVal;
    }).length;
    return {rank:better+1, total:coords.length};
  })();

  if(view==="coord") return <CoordScreen coord={selCoord}
      driver={drivers[selCoord?.coordKey]||null}
      waGroupLink={waLinks[selCoord?.coordKey]||""}
      week={week} onBack={coordParam?null:()=>setView("admin")}
      updatedAt={updatedAt} history={coordHistory[selCoord?.coordKey]||[]}
      memberEntry={memberData[selCoord?.coordKey]||null}
      rank={coordRank?.rank} totalCoords={coordRank?.total}
      allCustomers={allTimeCustomers[selCoord?.coordKey]||{}}
      deliveryDay={deliveryDays[selCoord?.coordKey]||null}
      tab={tab} setTab={setTab} toast={toast} showToast={showToast}/>;

  return null;
}

function weekOfMonth() {
  const d = new Date().getDate();
  return ['','ראשון','שני','שלישי','רביעי','חמישי'][Math.ceil(d/7)] || Math.ceil(d/7);
}

function getCoordStatus(coord) {
  const p = pilotInfo(coord.launchDate);
  const orders = coord.orders.length;
  const revenue = coord.orders.reduce((s,o) => s+o.total, 0);
  if (p.status === 'regular') {
    if (revenue < 1000) return 'red';
    if (revenue < 2500) return 'yellow';
    return 'green';
  }
  // פיילוט: רק אדום/ירוק
  return orders < 5 ? 'red' : 'green';
}
const STATUS_SORT   = { red:0, yellow:1, green:2 };
const STATUS_EMOJI  = { red:'🔴', yellow:'🟡', green:'🟢' };
const STATUS_BG     = { red:'#fef2f2', yellow:'#fffbeb', green:'#f0fdf4' };
const STATUS_BORDER = { red:'#fca5a5', yellow:'#fcd34d', green:'#86efac' };

// Commission CSV export
// ══════════════════════════════════════════════
function exportCommissionCSV(month, coords, coordHistory) {
  const [yearStr, monStr] = month.split('-');
  const year = parseInt(yearStr), mon = parseInt(monStr);
  const cityMap = {};
  (coords||[]).forEach(c=>{ cityMap[c.coordKey]=c.city||c.coordName||c.coordKey; });
  const rows=[];
  Object.entries(coordHistory||{}).forEach(([coordKey,history])=>{
    const city=(cityMap[coordKey]||coordKey).trim().replace(/,+$/,'');
    const station=city+'- תום';
    (history||[]).forEach(h=>{
      if(!h.date) return;
      const d=new Date(h.date);
      if(d.getFullYear()!==year||d.getMonth()+1!==mon) return;
      const total=Math.round(h.revenue||0);
      const vat=Math.round(total*0.02);
      const net=total-vat;
      const comm=Math.round(net*0.045);
      const dd=String(d.getDate()).padStart(2,'0');
      const mm=String(d.getMonth()+1).padStart(2,'0');
      const yy=String(d.getFullYear()).slice(2);
      rows.push([`${dd}/${mm}/${yy}`, station, total, vat, net, '4.50%', comm]);
    });
  });
  if(!rows.length){alert('אין נתונים לחודש זה — ודאי שהיסטוריה נשמרה בעת שליחת ההתראות');return;}
  rows.sort((a,b)=>{
    const p=s=>{const[d,m,y]=s.split('/').map(Number);return new Date(2000+y,m-1,d).getTime();};
    return p(a[0])-p(b[0]);
  });
  const totT=rows.reduce((s,r)=>s+r[2],0), totV=rows.reduce((s,r)=>s+r[3],0);
  const totN=rows.reduce((s,r)=>s+r[4],0), totC=rows.reduce((s,r)=>s+r[6],0);
  rows.push(['','סה"כ',totT,totV,totN,'',totC]);
  const hdr=['תאריך','שם העמדה','סה"כ הזמנות השבוע','מעמ','סה"כ מכירות בניכוי מעמ','אחוזי עמלה','תשלום עמלה'];
  const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.target='_blank';
  const MN=['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  a.download=`עמלות_${MN[mon]}_${year}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function AdminScreen({coords,times,drivers,waLinks,week,notifs,progress,updatedAt,memberData,coordHistory,
    deliveryDays={},groupNames={},adminTab='overview',onAdminTab,
    onSaveTimes,onSaveDrivers,onSaveWaLinks,onFireNotif,onSaveMemberData,onSaveDeliveryDays,onSaveGroupNames,

  const setAdTab=t=>{onAdminTab&&onAdminTab(t);};
  const [search,setSearch]=useState("");
  const [localTimes,setLocalTimes]=useState({...times});
  const [localDrivers,setLocalDrivers]=useState({...drivers});
  const [localWaLinks,setLocalWaLinks]=useState({...waLinks});
  const [localMembers,setLocalMembers]=useState({...memberData});
  const [localDelivDays,setLocalDelivDays]=useState({...deliveryDays});
  const [localGrpNames,setLocalGrpNames]=useState({...groupNames});
  const [membersInput,setMembersInput]=useState({});
  const [sortBy,setSortBy]=useState('amount-asc');

  const pilotCoords  = coords.filter(c=>pilotInfo(c.launchDate).status==='pilot');
  const regularCoords= coords.filter(c=>pilotInfo(c.launchDate).status!=='pilot');

  const sortedCoords=[...regularCoords].sort((a,b)=>{
    if(sortBy==='alpha') return (a.coordName||'').localeCompare(b.coordName||'','he');
    const ra=a.orders.reduce((s,o)=>s+o.total,0);
    const rb=b.orders.reduce((s,o)=>s+o.total,0);
    return sortBy==='amount-asc'?ra-rb:rb-ra;
  });
  const filteredCoords=search?coords.filter(c=>c.coordName.includes(search)||(c.city||'').includes(search)):coords;

  const totalOrders=coords.reduce((s,c)=>s+c.orders.length,0);
  const totalRev=coords.reduce((s,c)=>s+c.orders.reduce((x,o)=>x+o.total,0),0);
  const latestMembers=(progress||[]).filter(p=>p.members!=null).slice(-1)[0]?.members||0;
  const totalGroupMembers=Object.values(memberData||{}).reduce((s,e)=>s+(e?.count||0),0);
  const membersPct=Math.min(100,Math.round((totalGroupMembers/GROUP_TARGET)*100));
  const storeOpen=week.openedAt&&(Date.now()-week.openedAt<7*24*3600*1000);
  // coordinators not updated in the last 8 days
  const now8=Date.now()-8*24*3600*1000;
  const staleCoords=coords.filter(c=>{const e=memberData?.[c.coordKey]; return !e||!e.lastUpdated||new Date(e.lastUpdated).getTime()<now8;});

  const updatedStr = updatedAt ? new Date(updatedAt).toLocaleString('he-IL',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'}) : null;

  function updDriver(key,field,val){
    setLocalDrivers(prev=>({...prev,[key]:{...(prev[key]||{}), [field]:val}}));

      </GreenHeader>

      <div style={{background:"#1a3c2e",display:"flex",borderBottom:"2px solid #2d6a4f",overflowX:"auto"}}>
        {[["checklist","✅"],["overview","📊"],["coords","🔗"],["members","👥"],["drivers","🚐"],["history","🕐"],["guide","📖"]].map(([k,l])=>(
          <div key={k} onClick={()=>setAdTab(k)} style={{flex:"0 0 auto",padding:"10px 14px",textAlign:"center",fontSize:18,color:adTab===k?"#ffd166":"rgba(255,255,255,.45)",borderBottom:adTab===k?"2px solid #ffd166":"2px solid transparent",cursor:"pointer",marginBottom:-2}}>
            {l}
          </div>
        ))}
      </div>

      <Body>
        {adTab==="checklist" && <ChecklistTab staleCoords={staleCoords} coords={coords} showToast={showToast} week={week}/>}

        {adTab==="overview" && <>
          {/* ── יעדים שבועיים ── */}
          {(()=>{
            const REV_TARGET=40000, ORD_TARGET=200;
            const revPct=Math.min(100,Math.round(totalRev/REV_TARGET*100));
            const ordPct=Math.min(100,Math.round(totalOrders/ORD_TARGET*100));
            const revDone=totalRev>=REV_TARGET, ordDone=totalOrders>=ORD_TARGET;

              <div style={{height:8,borderRadius:4,background:'#e5e7eb',overflow:'hidden',marginTop:6}}>

                      <span style={{fontSize:11,opacity:.75}}>📋 מזמינים</span>

  function parseCSVText(raw){
    const rows=[]; let field='',row=[],inQ=false;
    const t=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    for(let i=0;i<t.length;i++){
      const ch=t[i];
      if(inQ){
        if(ch==='"'&&t[i+1]==='"'){field+='"';i++;}
        else if(ch==='"'){inQ=false;}
        else{field+=ch;}
      }else{
        if(ch==='"'){inQ=true;}
        else if(ch===','){row.push(field);field='';}
        else if(ch==='\n'){row.push(field);if(row.some(c=>c.trim()))rows.push(row);field='';row=[];}
        else{field+=ch;}
      }
    }
    if(row.length||field){row.push(field);if(row.some(c=>c.trim()))rows.push(row);}
    return rows;
  }

      if(rows.length<2){setPopNewCustomers([]);return;}
      const hdrs=rows[0];
      const iName=hdrs.indexOf('שם לקוח');
      const iFirst=hdrs.indexOf('הזמנה ראשונה');

      if(iName<0||iFirst<0||iPhone<0){alert('לא זוהה פורמט פופ תקין');return;}
      const seen=new Set();
      const list=rows.slice(1)
        .filter(r=>(r[iFirst]||'').toLowerCase()==='true')
        .map(r=>({name:(r[iName]||'').trim(),phone:(r[iPhone]||'').replace(/\D/g,'')}))
        .filter(r=>r.phone&&r.name&&!seen.has(r.phone)&&seen.add(r.phone));
      setPopNewCustomers(list);
    };
    reader.readAsText(file,'UTF-8');
    e.target.value='';
  }

// SPARKLINE
// ══════════════════════════════════════════════
function Sparkline({history, isRegular}) {
  if (!history || history.length < 2) return null;
  const data = history.slice(-6);
  const vals = data.map(d => isRegular ? (d.revenue||0) : (d.orders||0));
  const max = Math.max(...vals, 1);
  const W = 100, H = 28;
  const pts = vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-(v/max)*H}`).join(' ');
  const last = vals[vals.length-1];
  const prev = vals[vals.length-2];
  const up = last > prev, dn = last < prev;
  const tc = up ? '#86efac' : dn ? '#fca5a5' : '#ffd166';
  const arrow = up ? '↑' : dn ? '↓' : '→';
  return (
    <div style={{marginTop:14}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,opacity:.75,marginBottom:5}}>
        <span>📊 {data.length} שבועות אחרונים</span>
        <span style={{color:tc,fontWeight:700}}>{arrow} {isRegular?`₪${last.toLocaleString('he-IL')}`:`${last} הז׳`}</span>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible',display:'block'}}>
        <polyline points={pts} fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        {vals.map((v,i)=>(
          <circle key={i}
            cx={(i/(vals.length-1))*W} cy={H-(v/max)*H}
            r={i===vals.length-1?3:2}
            fill={i===vals.length-1?tc:"rgba(255,255,255,.45)"}/>
        ))}
      </svg>
    </div>
  );
}

// CONFETTI
// ══════════════════════════════════════════════
function Confetti({colors}) {
  const COLORS = colors || ['#ffd166','#86efac','#60a5fa','#f472b6','#fb923c','#a78bfa','#34d399','#fbbf24'];
  const pieces = Array.from({length: 28}, (_, i) => ({
    id: i,
    color: COLORS[i % COLORS.length],
    left: `${((i * 3.7 + Math.sin(i) * 9 + 3) % 96) + 2}%`,
    delay: `${((i * 0.11) % 1.6).toFixed(2)}s`,
    duration: `${(1.6 + (i % 6) * 0.25).toFixed(2)}s`,
    size: 6 + (i % 5) * 2,
    radius: i % 3 === 0 ? '50%' : i % 3 === 1 ? '2px' : '0%',
  }));
  return (
    <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,overflow:'hidden',pointerEvents:'none',zIndex:5}}>
      {pieces.map(p => (
        <div key={p.id} style={{
          position:'absolute', left:p.left, top:'-12px',
          width:p.size, height:p.size,
          background:p.color, borderRadius:p.radius,
          animation:`confettiFall ${p.duration} ${p.delay} ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function CoordScreen({coord,driver,waGroupLink,week,onBack,tab,setTab,toast,showToast,updatedAt,history,memberEntry,rank,totalCoords,allCustomers={},deliveryDay=null}) {
  if(!coord) return null;
  const totalRev=coord.orders.reduce((s,o)=>s+o.total,0);
  const orderCount=coord.orders.length;
  const MIN_ORDERS=5;
  const pilot=pilotInfo(coord.launchDate);
  const isRegular=pilot.status==='regular';
  const MIN_REV=1000;
  const ASPIRE_REV=2500;
  const belowMin=isUrgent()&&(isRegular ? totalRev<MIN_REV : orderCount<MIN_ORDERS);
  const activeReminders=getActiveReminders(pilot, deliveryDay);
  const missing=MIN_ORDERS-orderCount;
  const daysSinceLaunch = pilot.launch ? Math.floor((Date.now()-pilot.launch.getTime())/(24*3600*1000)) : 999;
  const justGraduated = isRegular && daysSinceLaunch < 35;
  // pilotPassed: majority of recorded weeks had ≥5 orders; if no history, check current week
  const pilotPassed = justGraduated && (()=>{
    if (!history || history.length === 0) return orderCount >= MIN_ORDERS;
    const good = history.filter(h=>(h.orders||0) >= MIN_ORDERS).length;
    return good >= Math.ceil(history.length / 2);
  })();
  const prevWeeks = (history||[]).filter(h=>h.week!==week?.num).sort((a,b)=>a.week-b.week);
  const lastWeek = prevWeeks.length ? prevWeeks[prevWeeks.length-1] : null;

function OrdersTab({coord,showToast,deliveryDay=null,week,allCustomers={}}) {
  const [copied,setCopied]=useState(false);
  const [expanded,setExpanded]=useState(null);
  const [arrivalTime,setArrivalTime]=useState(()=>{
    const k=`pop_drv_${coord.coordKey}_${new Date().toISOString().slice(0,10)}`;
    return localStorage.getItem(k)||'';
  });
  const [arrivalCopied,setArrivalCopied]=useState(false);
  const [arrivalSaved,setArrivalSaved]=useState(false);
  const [showLapsed,setShowLapsed]=useState(false);
  const newCount=coord.orders.filter(o=>o.returning===false).length;
  const retCount=coord.orders.length-newCount;

  // לקוחות שהזמינו בעבר ולא השבוע
  const currentOrdererKeys = new Set(
    coord.orders.flatMap(o=>[
      o.phone?o.phone.replace(/\D/g,''):null,
      o.name?o.name.trim():null,
    ].filter(Boolean))
  );
  const lapsed = Object.entries(allCustomers)
    .filter(([key,c])=>{
      if(!c.weeks?.length) return false;
      if(currentOrdererKeys.has(key)) return false;
      if(c.name&&currentOrdererKeys.has(c.name.trim())) return false;
      return true;
    })
    .map(([,c])=>c)
    .sort((a,b)=>(b.weeks?.length||0)-(a.weeks?.length||0));

  function saveArrival(t){
    const k=`pop_drv_${coord.coordKey}_${new Date().toISOString().slice(0,10)}`;
    localStorage.setItem(k,t);
    setArrivalTime(t);
  }

  async function saveArrivalToServer(t){
    try{
      await fetch('/api/driver-arrival',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({coordKey:coord.coordKey,coordName:coord.coordName,date:new Date().toISOString().slice(0,10),time:t,week:week?.num||null})});
      setArrivalSaved(true);
      showToast('✅ שעת הגעה נשמרה');
      setTimeout(()=>setArrivalSaved(false),3000);
    }catch(e){showToast('❌ שגיאה בשמירה');}
  }

  function buildArrivalMsg(t){
    const location=coord.city||coord.deliveryStr?.split(' - ')[0]||'נקודת האיסוף';
    const names=coord.orders.map((o,i)=>`${i+1}. ${o.name||'—'}`).join('\n');
    return `🚗 הנהג הגיע${t?` בשעה ${t}`:''}!\n\nהגיעו לאסוף (${coord.orders.length} הזמנות):\n${names}\n\n📍 ${location}\n\nמחכים לכם! 🌿`;
  }

  function copyList(){
    const lines=[`שלום חברים! 😊`,`הנה רשימת המזמינים לחלוקה:`,"",...coord.orders.map((o,i)=>`${i+1}. ${o.name}${o.phone?" — "+fmtPhone(o.phone):""}`),"",`סה"כ ${coord.orders.length} מזמינים. מחכים לכם! 🌿`];
    navigator.clipboard.writeText(lines.join("\n")).then(()=>{setCopied(true);showToast("✅ הועתק");setTimeout(()=>setCopied(false),3500);});
  }

  const deadlineDayName = (()=>{
    const HDAYS={'א':0,'ב':1,'ג':2,'ד':3,'ה':4};

    return ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][cd];

  return <>
    {/* ── ספירה לאחור ── */}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            🕐 ההזמנות נסגרות ב{deadlineDayName} 8:00
            <Tip text={deliveryDay==='ד'?"החנות שלך נסגרת ביום רביעי 8:00 בגלל חלוקה ביום רביעי.":"החנות נסגרת ביום חמישי 8:00. אחרי כן לא ניתן להוסיף הזמנות."} pos="above"/>
          </div>
          <div style={{fontSize:22,fontWeight:900,lineHeight:1}}>
            <Countdown delivDay={deliveryDay} style={{fontSize:22,fontWeight:900,color:'#fff'}} label={false}/>
          </div>
        </div>
        <div style={{fontSize:38,opacity:.2}}>⏰</div>
      </div>
    </Card>

    {/* ── רשימת מזמינים ── */}
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center'}}><p style={{...T.cardTitle,margin:0}}>📋 רשימת מזמינים</p><Tip text="כל ההזמנות שהתקבלו אצלך השבוע. 🆕 = מזמין חדש · 🔄 = חוזר. לחץ על הזמנה לפירוט פריטים."/></div>

function calcStreak(weeks, currentWeek) {
  if (!weeks || weeks.length === 0) return 0;
  const sorted = [...weeks].sort((a,b)=>a-b);
  const last = sorted[sorted.length-1];
  // streak only counts if customer ordered this week
  if (currentWeek && last !== currentWeek) return 0;
  let streak = 1;
  for (let i = sorted.length-2; i >= 0; i--) {
    if (sorted[i] === sorted[i+1]-1) streak++;
    else break;
  }
  return streak;
}

function CustomersTab({allCustomers, week, showToast}) {
  const [search, setSearch] = useState('');
  const [sortBy, setSortBy] = useState('alpha'); // alpha | count | streak
  const currentWeek = week?.num || 0;

  const list = Object.values(allCustomers).map(c => ({
    ...c,
    count:  (c.weeks||[]).length || 1,
    streak: calcStreak(c.weeks, currentWeek),
  }));

  const sorted = [...list].sort((a,b) => {
    if (sortBy==='count')  return b.count - a.count;
    if (sortBy==='streak') return b.streak - a.streak || b.count - a.count;
    return (a.name||'').localeCompare(b.name||'', 'he');
  });

  const filtered = search.trim()
    ? sorted.filter(c => (c.name||'').includes(search) || (c.phone||'').includes(search))
    : sorted;

  const withPhone   = list.filter(c => c.phone).length;
  const activeNow   = list.filter(c => c.streak > 0).length;  // ordered this week
  const loyal       = list.filter(c => c.count >= 3).length;  // 3+ weeks

  function copyAll() {
    const lines = sorted.map((c,i) => `${i+1}. ${c.name||'—'}${c.phone?' — '+fmtPhone(c.phone):''} (${c.count}×${c.streak>=2?` 🔥${c.streak}`:''})`);
    navigator.clipboard.writeText(lines.join('\n')).then(() => showToast('✅ הרשימה הועתקה'));
  }

  const SortBtn = ({k,label}) => (
    <button onClick={()=>setSortBy(k)}
      style={{padding:'5px 10px',borderRadius:8,border:'none',fontSize:11,fontWeight:700,cursor:'pointer',
        background:sortBy===k?'#2d6a4f':'#f3f4f6',color:sortBy===k?'#fff':'#6b7280'}}>
      {label}
    </button>
  );

  return (
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <p style={{...T.cardTitle,margin:0}}>👥 לקוחות מכל הזמנים</p>
          <Tip text="כל הלקוחות שהזמינו אצלך אי פעם — נצבר שבוע אחר שבוע. '×' = כמה שבועות הזמינו. 🔥 = ברצף רצוף עד השבוע הנוכחי."/>
        </div>
        <span style={{fontSize:11,color:'#6b7280',fontWeight:700}}>{list.length} סה"כ</span>
      </div>

      {/* ── סטטיסטיקות מהירות ── */}
      {list.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:10}}>
          {[
            {label:'הזמינו השבוע', val:activeNow,  color:'#16a34a'},
            {label:'נאמנים (3+)',   val:loyal,       color:'#7c3aed'},
            {label:'עם טלפון',     val:withPhone,   color:'#0891b2'},
          ].map(({label,val,color})=>(
            <div key={label} style={{background:'#f9fafb',borderRadius:8,padding:'7px 8px',textAlign:'center'}}>
              <div style={{fontSize:16,fontWeight:900,color}}>{val}</div>
              <div style={{fontSize:9,color:'#9ca3af',marginTop:1}}>{label}</div>
            </div>
          ))}
        </div>
      )}

      {list.length === 0 ? (
        <div style={{textAlign:'center',color:'#9ca3af',fontSize:13,padding:'24px 0'}}>אין נתונים עדיין — ייאסף אוטומטית מהשבוע הנוכחי</div>
      ) : (<>
        <input
          value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 חיפוש לפי שם או טלפון..."
          style={{width:'100%',boxSizing:'border-box',border:'1px solid #d1fae5',borderRadius:10,padding:'9px 12px',fontSize:13,marginBottom:8,outline:'none'}}
        />

        {/* ── מיון ── */}
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          <SortBtn k="alpha"  label="א–ת"/>
          <SortBtn k="count"  label="🏆 הכי נאמן"/>
          <SortBtn k="streak" label="🔥 רצף"/>
        </div>

        {filtered.map((c,i) => {
          const streakActive = c.streak >= 2;
          const isLoyal = c.count >= 3;
          return (
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:i<filtered.length-1?'1px solid #f0f4f1':'none'}}>
              {/* אות ראשונה */}
              <div style={{width:28,height:28,borderRadius:'50%',

                    color: isLoyal?'#6d28d9':'#6b7280',
                    borderRadius:4,padding:'1px 5px'}}>
                    {c.count}×
                  </span>
                  {/* רצף */}
                  {streakActive && (
                    <span style={{fontSize:10,fontWeight:700,background:'#fef3c7',color:'#92400e',borderRadius:4,padding:'1px 5px'}}>
                      🔥 {c.streak} ברצף
                    </span>
                  )}
                  {c.streak===1 && c.count>1 && (
                    <span style={{fontSize:10,color:'#9ca3af'}}>לא בשבוע הזה</span>
                  )}
                </div>
              </div>

              {/* כפתור וואטסאפ */}
              {c.phone && (
                <a href={waLink(c.phone)} target="_blank"
                  style={{width:32,height:32,background:'#25d366',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:15,textDecoration:'none',flexShrink:0}}>💬</a>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{textAlign:'center',color:'#9ca3af',fontSize:13,padding:'16px 0'}}>לא נמצאו תוצאות</div>}
        <button onClick={copyAll} style={{...S.btn,marginTop:14,background:'#2d6a4f'}}>📋 העתק רשימה מלאה</button>
      </>)}
    </Card>
  );
}

    <div style={{...S.card,borderRight:`4px solid ${color}`}}>

  const [copied,setCopied]=useState(false);

  function copy(){navigator.clipboard.writeText(text).then(()=>{setCopied(true);showToast("✅ הועתק!");setTimeout(()=>setCopied(false),2500);});}

    setSharing(true);
    try {
      const res=await fetch('/pop-community.jpg');
      const blob=await res.blob();
      const file=new File([blob],'pop-community.jpg',{type:'image/jpeg'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],text});
        showToast("✅ שותף!");
      } else if(navigator.share){
        await navigator.share({text});
        showToast("✅ שותף!");
      } else {
        await navigator.clipboard.writeText(text);
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pop-community.jpg';a.click();
        showToast("✅ הטקסט הועתק והתמונה הורדה!");
      }
    } catch(e){if(e.name!=='AbortError')showToast("❌ שגיאה בשיתוף");}
    setSharing(false);
  }
  return (
    <div style={{...S.card,borderRight:`4px solid ${color}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><div style={{fontSize:14,fontWeight:800,color:"#1a3c2e"}}>{title}</div><div style={{fontSize:11,color:"#6b7280"}}>{sub}</div></div>
        <button onClick={copy} style={{background:copied?"#16a34a":color,color:"#fff",border:"none",padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",transition:"background .3s",flexShrink:0}}>
          {copied?"✅ הועתק":"📋 העתק"}
        </button>
      </div>
      <img src="/pop-community.jpg" alt="פופ ישראל" style={{width:"100%",borderRadius:8,marginBottom:8,display:"block",objectFit:"cover",maxHeight:180}}/>
      <div style={{background:"#f9fafb",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#374151",whiteSpace:"pre-wrap",direction:"rtl",lineHeight:1.6,maxHeight:90,overflow:"hidden",marginBottom:8}}>
        {text.length>180?text.slice(0,180)+"…":text}
      </div>
      <button onClick={shareWithImage} disabled={sharing} style={{width:"100%",background:sharing?"#9ca3af":"#128C7E",color:"#fff",border:"none",padding:"9px",borderRadius:8,fontSize:13,fontWeight:700,cursor:sharing?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        {sharing?"⏳ שולח...":"📤 שתף עם תמונה (וואטסאפ)"}
      </button>
    </div>
  );
}

// HISTORY TAB — browse & download past CSV snapshots
// ══════════════════════════════════════════════
function HistoryTab({showToast}) {
  const [files, setFiles] = useState(null);   // null=loading, []=empty
  const [uploading, setUploading] = useState(false);
  const [uploadDate, setUploadDate] = useState('');
  const [uploadFile, setUploadFile] = useState(null);
  const [uploadName, setUploadName] = useState('');

  useEffect(() => { loadFiles(); }, []);

  function loadFiles() {
    setFiles(null);
    fetch('/api/history').then(r=>r.json()).then(d=>setFiles(d.files||[])).catch(()=>setFiles([]));
  }

  function fmtDate(d) {
    // d = "YYYY-MM-DD"
    try {
      const [y,m,day] = d.split('-');
      return new Date(+y,+m-1,+day).toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
    } catch(e) { return d; }
  }
  function fmtSize(b) {
    return b>1024 ? Math.round(b/1024)+' KB' : b+' B';
  }

  function handleFileInput(e) {
    const f = e.target.files[0];
    if (!f) return;
    setUploadFile(f);
    setUploadName(f.name);
    // try to parse date from filename like orders_2025-05-10.csv
    const m = f.name.match(/(\d{4}-\d{2}-\d{2})/);
    if (m) setUploadDate(m[1]);
  }

  async function doUpload() {
    if (!uploadFile) { showToast('⚠️ בחר קובץ'); return; }
    if (!/^\d{4}-\d{2}-\d{2}$/.test(uploadDate)) { showToast('⚠️ בחר תאריך תקין'); return; }
    setUploading(true);
    try {
      const text = await uploadFile.text();
      const r = await fetch(`/api/history/upload?date=${uploadDate}`, {
        method:'POST', headers:{'Content-Type':'text/plain'}, body: text
      });
      const d = await r.json();
      if (d.ok) { showToast('✅ הועלה: '+d.filename); setUploadFile(null); setUploadName(''); setUploadDate(''); loadFiles(); }
      else showToast('❌ שגיאה: '+(d.error||'unknown'));
    } catch(e) { showToast('❌ '+e.message); }
    finally { setUploading(false); }
  }

  return <>
    {/* ── Upload card ── */}
    <Card>
      <div style={{fontSize:13,fontWeight:900,color:'#1a3c2e',marginBottom:10,display:'flex',alignItems:'center',gap:6}}>
        📂 העלאת CSV ידנית
        <Tip text="אם יש לך קובץ CSV ישן מפופ שלא נשמר אוטומטית — העלה אותו כאן עם התאריך המתאים. הקובץ יישמר בארכיון."/>
      </div>
      <input type="file" id="hist_upload_input" accept=".csv" style={{display:'none'}} onChange={handleFileInput}/>
      <button onClick={()=>document.getElementById('hist_upload_input').click()}
        style={{...S.btn,background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe',marginBottom:8,width:'100%'}}>
        📄 {uploadName || 'בחר קובץ CSV'}
      </button>
      {uploadName && <>
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
          <label style={{fontSize:11,color:'#6b7280',whiteSpace:'nowrap'}}>תאריך הנתונים:</label>
          <input type="date" value={uploadDate} onChange={e=>setUploadDate(e.target.value)}
            style={{...S.input,flex:1,fontSize:13,padding:'7px 10px'}}/>
        </div>
        <button onClick={doUpload} disabled={uploading}
          style={{...S.btn,width:'100%',background:'#2d6a4f',opacity:uploading?0.6:1}}>
          {uploading ? '⏳ מעלה...' : '💾 שמור בארכיון'}
        </button>
      </>}
    </Card>

    {/* ── File list ── */}
    <Card>
      <div style={{fontSize:13,fontWeight:900,color:'#1a3c2e',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{display:'flex',alignItems:'center',gap:6}}>
          🕐 ארכיון שבועות קודמים
          <Tip text="כל פעם ש-refresh.js רץ, הוא שומר snapshot של הנתונים. לחץ להורדה כדי לקבל קובץ CSV מוכן לניתוח."/>
        </span>
        <button onClick={loadFiles} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'#2d6a4f'}}>🔄</button>
      </div>
      {files===null && <div style={{textAlign:'center',color:'#9ca3af',padding:'20px 0',fontSize:13}}>⏳ טוען...</div>}
      {files!==null && files.length===0 && (
        <div style={{textAlign:'center',color:'#9ca3af',padding:'20px 0',fontSize:13}}>
          <div style={{fontSize:28,marginBottom:6}}>🗂️</div>
          אין עדיין snapshots שמורים.<br/>
          <span style={{fontSize:11}}>הם יתחילו להיווצר אוטומטית בריצה הבאה של refresh.js</span>
        </div>
      )}
      {files!==null && files.map(f=>(
        <div key={f.filename} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'10px 12px',borderRadius:8,border:'1px solid #e5e7eb',marginBottom:6,background:'#fafafa'}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:'#1a3c2e'}}>{fmtDate(f.date)}</div>
            <div style={{fontSize:10,color:'#9ca3af',marginTop:2}}>{f.filename} · {fmtSize(f.size)}</div>
          </div>
          <a href={`/api/history/${f.filename}`} download={f.filename}
            style={{...S.btn,textDecoration:'none',fontSize:11,padding:'6px 12px',background:'#f0fdf4',color:'#166534',border:'1px solid #bbf7d0'}}>
            ⬇️ הורד
          </a>
        </div>
      ))}
    </Card>
  </>;
}

            <div style={{borderTop:"1px solid #e8ede9",padding:"10px 14px 14px",display:"flex",flexDirection:"column",gap:8}}>
              {sec.items.map((item,i)=>(
                <div key={i} style={{background:"#f9fafb",borderRadius:9,padding:"10px 12px",borderRight:"3px solid #52b788"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#1a3c2e",marginBottom:3}}>{item.h}</div>
                  <div style={{fontSize:12,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap"}}>{item.b}</div>
                </div>
              ))}
            </div>
          )}
        </Card>
      ))}
      <Card>
        <p style={{...T.cardTitle,marginBottom:6}}>❓ שאלות נפוצות</p>
        {FAQ.map((f,i)=>(
          <div key={i} style={{borderBottom:"1px solid #e8ede9"}}>
            <div onClick={()=>setOpen(open===i?null:i)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",cursor:"pointer"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#1a3c2e",flex:1,paddingLeft:8}}>{f.q}</span>
              <span style={{color:"#6b7280",fontSize:16}}>{open===i?"▲":"▼"}</span>
            </div>
            {open===i&&<div style={{paddingBottom:12}}>
              <div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 12px",fontSize:13,color:"#374151",lineHeight:1.6,marginBottom:8}}>{f.a}</div>
              <CopyBtnSimple text={`${f.q}\n${f.a}`} label="📋 העתק תשובה"/>
            </div>}
          </div>
        ))}
      </Card>
    </div>
  );
}

function RemindersTab({coord,pilot,activeReminders,waGroupLink,history,showToast}) {
  const [notifGranted,setNotifGranted]=useState(typeof Notification!=="undefined"?Notification.permission==="granted":false);
  async function requestNotif(){const perm=await Notification.requestPermission();setNotifGranted(perm==="granted");showToast(perm==="granted"?"✅ נוטיפיקציות פעילות!":"⚠️ לא אושר");}
  function testNotif(){if(!notifGranted){showToast("⚠️ אשר קודם");return;}new Notification("🌿 תזכורת פופ ישראל",{body:"החנות פתוחה! הזמן עכשיו ✅"});}
  const pilotMsg=buildPilotMsg(coord,waGroupLink);
  return <>
    {(activeReminders||[]).map(r=>(
      <div key={r.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",marginBottom:10,borderRight:`4px solid ${r.color}`,boxShadow:"0 2px 10px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:14,fontWeight:800,color:"#1a3c2e",marginBottom:4}}>{r.title}</div>
        <div style={{fontSize:13,color:"#374151",lineHeight:1.6}}>{r.body}</div>
      </div>
    ))}
    <Card style={{borderRight:"4px solid #2d6a4f"}}>
      <p style={{...T.cardTitle,marginBottom:4}}>🔔 תזכורות בדפדפן</p>
      <p style={{fontSize:12,color:"#6b7280",marginBottom:10,lineHeight:1.6}}>תזכורות שמופיעות על המסך של הטלפון/מחשב הזה בזמנים הנכונים:</p>
      <div style={{fontSize:12,color:"#374151",lineHeight:1.9,marginBottom:10}}>
        <div>🗓️ <strong>חמישי–שבת</strong> — הזמן משתתפים חדשים לפני פתיחת החנות</div>
        <div>🧺 <strong>שני בבוקר</strong> — הזמן סל רכז לפני 14:00</div>
        <div>🚗 <strong>יום החלוקה בבוקר</strong> — מלא שעת הגעת הנהג</div>
        {pilot?.status==="pilot"&&<div>💬 <strong>שבוע 2 בפיילוט</strong> — שתף משוב על הסחורה</div>}
      </div>
      {!notifGranted
        ?<button style={S.btn} onClick={requestNotif}>🔔 אפשר תזכורות</button>
        :<div style={{display:"flex",gap:8}}>
          <button style={{...S.btnSmall,background:"#6b7280",padding:10,flex:1}} onClick={testNotif}>🧪 שלח תזכורת ניסיון</button>
        </div>}
      {notifGranted&&<p style={{fontSize:11,color:"#16a34a",marginTop:10,textAlign:"center"}}>✅ תזכורות פעילות על המכשיר הזה</p>}
    </Card>
    {pilot?.status==="pilot" && (
      <Card style={{borderRight:"4px solid #f4a261"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div><p style={{...T.cardTitle,marginBottom:2}}>🌱 הודעת פיילוט — שבוע {pilot.week}/4</p><p style={{fontSize:11,color:"#6b7280"}}>לפרסום לשכנים וחברים</p></div>
          <CopyBtnSimple text={pilotMsg} label="📋 העתק"/>
        </div>
        <div style={{background:"#fffbf0",border:"1px solid #fde68a",borderRadius:10,padding:"12px",fontSize:12,color:"#374151",whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:220,overflowY:"auto",direction:"rtl"}}>
          {pilotMsg}
        </div>
        {waGroupLink&&<a href={waGroupLink} target="_blank" style={{display:"block",marginTop:10,background:"#25d366",color:"#fff",padding:"10px",borderRadius:10,textAlign:"center",textDecoration:"none",fontWeight:700,fontSize:13}}>
          💬 פתח קבוצת וואטסאפ
        </a>}
      </Card>
    )}
    {history?.length > 0 && (
      <Card style={{borderRight:"4px solid #52b788"}}>
        <p style={{...T.cardTitle,marginBottom:12}}>📊 היסטוריית הזמנות</p>
        <MiniBarChart data={history}/>
      </Card>
    )}

    {pilot?.status==="regular" && (
      <Card style={{borderRight:"4px solid #16a34a",textAlign:"center",padding:"24px 16px"}}>
        <div style={{fontSize:36,marginBottom:8}}>🎉</div>
        <div style={{fontSize:16,fontWeight:900,color:"#1a3c2e",marginBottom:6}}>סיימת את הפיילוט!</div>
        <div style={{fontSize:13,color:"#6b7280",lineHeight:1.6}}>הנקודה שלך הפכה לנקודת חלוקה קבועה של פופ ישראל 🌿</div>
      </Card>
    )}
  </>;
}

function MiniBarChart({data}) {
  const maxOrders = Math.max(...data.map(d=>d.orders), 1);
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:72}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:10,fontWeight:700,color:"#2d6a4f"}}>{d.orders}</div>
          <div style={{width:"100%",background:"#52b788",borderRadius:"4px 4px 0 0",minHeight:4,
            height:Math.max(4,Math.round((d.orders/maxOrders)*44))+"px",transition:"height .4s"}}/>
          <div style={{fontSize:9,color:"#9ca3af",whiteSpace:"nowrap"}}>ש׳{d.week}</div>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════
// SHARED COMPONENTS
// ══════════════════════════════════════════════
function GreenHeader({title,sub,children}){
  return <div style={{background:"linear-gradient(155deg,#1a3c2e,#2d6a4f)",padding:"20px 20px 22px",color:"#fff",textAlign:"center"}}>
    <div style={{fontSize:32,marginBottom:4}}>🌿</div>
    <div style={{fontSize:22,fontWeight:900}}>{title}</div>
    {sub&&<div style={{fontSize:12,opacity:.65,marginTop:2}}>{sub}</div>}
    {children}
  </div>;
}
function Screen({children}){return <div style={{fontFamily:"'Heebo',sans-serif",minHeight:"100vh",background:"#fefcf7",direction:"rtl",maxWidth:480,margin:"0 auto"}}>{children}</div>;}
function Body({children}){return <div style={{padding:"14px 14px 48px"}}>{children}</div>;}
function Card({children,style={}}){return <div style={{...S.card,...style}}>{children}</div>;}
function Spinner(){return <div style={{width:36,height:36,border:"4px solid #e8ede9",borderTopColor:"#2d6a4f",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>;}
function Centered({children}){return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:60,gap:14}}>{children}</div>;}
function Muted({children}){return <p style={{color:"#6b7280",fontSize:14}}>{children}</p>;}
function Toast({msg}){return msg?<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#1a3c2e",color:"#fff",padding:"12px 22px",borderRadius:99,fontSize:14,fontWeight:600,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,.25)"}}>{msg}</div>:null;}
function CopyBtnSimple({text,label}){
  const [c,setC]=useState(false);
  return <button onClick={()=>{navigator.clipboard.writeText(text).then(()=>{setC(true);setTimeout(()=>setC(false),2000);});}}
    style={{background:c?"#16a34a":"#2d6a4f",color:"#fff",border:"none",padding:"7px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",transition:"background .3s"}}>
    {c?"✅ הועתק":label}
  </button>;
}
function Countdown({delivDay, style={}, label=true}) {
  const deadline = React.useMemo(()=>getOrderDeadline(delivDay),[delivDay]);
  const [diff,setDiff] = useState(()=>deadline-new Date());
  useEffect(()=>{
    const t=setInterval(()=>setDiff(deadline-new Date()),30000);
    return()=>clearInterval(t);
  },[deadline]);
  if(diff<=0) return <span style={{...style,color:'#ef4444'}}>ההזמנות סגורות ⛔</span>;
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000);
  let str = h>=48 ? `${Math.ceil(h/24)} ימים`
    : h>=24 ? `יום ו-${h%24} שע'`
    : h>=1  ? `${h}:${String(m).padStart(2,'0')} שע'`
    : `${m} דק'`;
  const urgent=h<4;
  return <span style={{...style,color:urgent?'#ef4444':style.color}}>{label?'⏰ ':''}{str}</span>;
}

function Tip({text,pos}){
  const [show,setShow]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    if(!show)return;
    function h(e){if(ref.current&&!ref.current.contains(e.target))setShow(false);}
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[show]);
  const above=pos==='above';
  return(
    <span ref={ref} style={{position:'relative',display:'inline-flex',alignItems:'center',verticalAlign:'middle',marginRight:5}}>
      <span onClick={e=>{e.stopPropagation();setShow(v=>!v);}}
        style={{width:15,height:15,background:show?'#2d6a4f':'#d1fae5',color:show?'#fff':'#065f46',borderRadius:'50%',
          fontSize:9,fontWeight:900,fontStyle:'italic',display:'inline-flex',alignItems:'center',justifyContent:'center',
          cursor:'pointer',flexShrink:0,userSelect:'none',border:'1px solid #a7f3d0',transition:'background .15s',lineHeight:1}}>i</span>
      {show&&(
        <span style={{position:'absolute',[above?'bottom':'top']:'calc(100% + 7px)',right:0,
          background:'#1a3c2e',color:'#fff',padding:'10px 12px',borderRadius:10,fontSize:12,lineHeight:1.6,
          width:230,zIndex:500,boxShadow:'0 4px 20px rgba(0,0,0,.3)',whiteSpace:'normal',textAlign:'right',fontWeight:400,fontStyle:'normal'}}>
          <span style={{position:'absolute',[above?'bottom':'top']:-5,right:7,width:10,height:10,background:'#1a3c2e',transform:'rotate(45deg)',borderRadius:2}}/>
          {text}
        </span>
      )}
    </span>
  );
}

const S={
  card:{background:"#fff",borderRadius:16,padding:"16px 14px",boxShadow:"0 2px 14px rgba(26,60,46,.09)",marginBottom:12},
  btn:{width:"100%",padding:13,background:"#2d6a4f",color:"#fff",border:"none",borderRadius:12,fontFamily:"Heebo,sans-serif",fontSize:15,fontWeight:800,cursor:"pointer"},
  btnSmall:{padding:"9px 12px",background:"#2d6a4f",color:"#fff",border:"none",borderRadius:8,fontFamily:"Heebo,sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"},
  iconBtn:{width:34,height:34,border:"none",borderRadius:8,background:"#f3f4f6",cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"},
  stepNum:{width:26,height:26,color:"#fff",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0},
  statBox:{background:"#fff",borderRadius:14,padding:"12px 8px",textAlign:"center",boxShadow:"0 2px 10px rgba(26,60,46,.08)"},
  statVal:{fontSize:18,fontWeight:900,color:"#2d6a4f"},
  statLbl:{fontSize:10,color:"#6b7280",marginTop:2},
  input:{width:"100%",border:"1.5px solid #d1fae5",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"Heebo,sans-serif",color:"#1a3c2e",background:"#f9fafb",outline:"none"},
};
const T={
  h2:{fontSize:17,fontWeight:800,color:"#1a3c2e",marginBottom:6},
  muted:{color:"#6b7280",fontSize:13},
  cardTitle:{fontSize:12,fontWeight:800,color:"#2d6a4f",textTransform:"uppercase",letterSpacing:".4px"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
